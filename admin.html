<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #fff; padding: 20px; }
        .panel { background: #1e293b; padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; }
        input { width: 95%; padding: 10px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white;}
        button { background: #10b981; color: white; padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%;}
    </style>
</head>
<body>
    <div class="panel">
        <h2 style="color: #10b981;">Add New Menu Item</h2>
        <input type="text" id="itemName" placeholder="Item Name (e.g. Espresso)">
        <input type="number" id="itemPrice" placeholder="Price (₹)">
        <button onclick="addItem()">Add to Database</button>
        <p id="feedback"></p>
        <a href="dashboard.html" style="color: #f59e0b; display: block; margin-top: 20px; text-align: center;">Go to Dashboard</a>
    </div>

    <script>
        const sup = supabase.createClient('https://udlmyspetkjzcdkfshgl.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkbG15c3BldGtqemNka2ZzaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxODIzMDksImV4cCI6MjA5NDc1ODMwOX0.oQL6hbwjQlU_2h4xcbD-v1yl7EubMz90VpIpTPBwEM4');

        async function addItem() {
            const name = document.getElementById('itemName').value;
            const price = document.getElementById('itemPrice').value;
            
            const { error } = await sup.from('menu').insert([{ name: name, price: parseFloat(price) }]);
            
            if(error) document.getElementById('feedback').innerText = "Error: " + error.message;
            else {
                document.getElementById('feedback').innerText = "Added successfully!";
                document.getElementById('itemName').value = '';
                document.getElementById('itemPrice').value = '';
            }
        }
    </script>
</body>
</html>
