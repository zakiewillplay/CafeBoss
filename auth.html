<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Boss – Welcome</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --primary: #FF6B35; --bg: #0f0f13; --card: rgba(30,30,35,0.9);
            --border: rgba(255,255,255,0.1); --text: #f0f0f0; --muted: #aaa; --input-bg: rgba(20,20,25,0.7);
        }
        body.light-mode {
            --bg: #f2f1ed; --card: rgba(255,255,255,0.95); --border: rgba(0,0,0,0.15); --text: #1a1a1a; --muted: #555; --input-bg: #fff;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); display:flex; align-items:center; justify-content:center; min-height:100vh; transition:0.4s; padding:1rem; }
        .auth-card { background:var(--card); backdrop-filter:blur(15px); border:1px solid var(--border); border-radius:28px; padding:3rem 2.5rem; width:100%; max-width:440px; }
        .logo { text-align:center; font-size:3rem; margin-bottom:0.5rem; }
        h2 { text-align:center; margin-bottom:1.8rem; color:var(--primary); }
        .tabs { display:flex; margin-bottom:2rem; border-radius:12px; overflow:hidden; border:1px solid var(--border); }
        .tabs button { flex:1; padding:0.9rem; border:none; cursor:pointer; background:transparent; color:var(--muted); font-weight:600; }
        .tabs button.active { background:var(--primary); color:#fff; }
        .form-group { margin-bottom:1.2rem; }
        label { display:block; margin-bottom:0.4rem; font-size:0.9rem; color:var(--muted); }
        input { width:100%; padding:0.9rem; border-radius:12px; border:1px solid var(--border); background:var(--input-bg); color:var(--text); font-size:0.95rem; }
        input:focus { outline:none; border-color:var(--primary); }
        .btn { width:100%; padding:1rem; border:none; border-radius:12px; background:var(--primary); color:#fff; font-weight:700; font-size:1rem; cursor:pointer; margin-top:0.5rem; }
        .btn:disabled { opacity:0.6; cursor:not-allowed; }
        .alt-links { text-align:center; margin-top:1.2rem; font-size:0.85rem; color:var(--muted); }
        .alt-links a { color:var(--primary); cursor:pointer; text-decoration:underline; }
        .toast { position:fixed; top:20px; right:20px; background:#27ae60; color:#fff; padding:1rem 1.5rem; border-radius:12px; z-index:999; transform:translateX(120%); transition:0.3s; }
        .toast.error { background:#c0392b; }
        .toast.show { transform:translateX(0); }
        .theme-toggle { position:absolute; top:1.5rem; right:1.5rem; background:var(--card); border:1px solid var(--border); color:var(--text); padding:0.5rem 1rem; border-radius:50px; cursor:pointer; font-size:0.9rem; }
    </style>
</head>
<body class="light-mode">
    <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
    <div class="auth-card">
        <div class="logo">☕</div>
        <h2 id="authTitle">Welcome Back</h2>
        <div id="toast" class="toast"></div>
        <div class="tabs" id="tabsRow">
            <button id="tabLogin" class="active">Login</button>
            <button id="tabSignup">Sign Up</button>
        </div>
        <form id="authForm" autocomplete="off">
            <div class="form-group" id="nameGroup" style="display:none;">
                <label for="cafeName">Cafe Name</label>
                <input type="text" id="cafeName" placeholder="My Cafe">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <div class="form-group" id="confirmGroup" style="display:none;">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••">
            </div>
            <button type="submit" class="btn" id="submitBtn">Login</button>
        </form>
        <div class="alt-links">
            <span id="toggleText">Don't have an account?</span>
            <a id="toggleLink">Sign Up</a>
            <span>|</span>
            <a id="forgotLink">Forgot Password?</a>
        </div>
    </div>
    <script>
        const SUPABASE_URL = 'https://pbbybxdxnvzhjtkpfpej.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiYnlieGR4bnZ6aGp0a3BmcGVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQ0ODksImV4cCI6MjA5NDk0MDQ4OX0.u3VWUTu633pKfZ5Y8jpe2FUX4Gf9NGAKCsBGXqGTtao';
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const urlParams = new URLSearchParams(window.location.search);
        const isRecovery = urlParams.get('type') === 'recovery';
        let mode = isRecovery ? 'recovery' : 'login';

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            document.querySelector('.theme-toggle').textContent = document.body.classList.contains('light-mode') ? '🌙 Dark' : '☀️ Light';
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }
        (function() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') document.body.classList.remove('light-mode');
            else if (saved === 'light') document.body.classList.add('light-mode');
            else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.body.classList.remove('light-mode');
            document.querySelector('.theme-toggle').textContent = document.body.classList.contains('light-mode') ? '🌙 Dark' : '☀️ Light';
        })();

        function showToast(msg, isErr=false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + (isErr ? 'error' : '') + ' show';
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function updateUI() {
            document.getElementById('authTitle').textContent = { login:'Welcome Back', signup:'Create Your Cafe', forgot:'Reset Password', recovery:'Set New Password' }[mode];
            document.getElementById('tabsRow').style.display = (mode==='forgot'||mode==='recovery') ? 'none' : 'flex';
            document.getElementById('tabLogin').classList.toggle('active', mode==='login');
            document.getElementById('tabSignup').classList.toggle('active', mode==='signup');
            document.getElementById('nameGroup').style.display = mode==='signup' ? 'block' : 'none';
            document.getElementById('confirmGroup').style.display = (mode==='signup'||mode==='recovery') ? 'block' : 'none';
            document.getElementById('toggleText').textContent = mode==='login' ? "Don't have an account?" : "Already have an account?";
            document.getElementById('toggleLink').textContent = mode==='login' ? 'Sign Up' : 'Login';
            document.getElementById('forgotLink').style.display = mode==='login' ? 'inline' : 'none';
            document.getElementById('submitBtn').textContent = { login:'Login', signup:'Sign Up', forgot:'Send Reset Link', recovery:'Update Password' }[mode];
        }

        document.getElementById('tabLogin').addEventListener('click', ()=>{ mode='login'; updateUI(); });
        document.getElementById('tabSignup').addEventListener('click', ()=>{ mode='signup'; updateUI(); });
        document.getElementById('toggleLink').addEventListener('click', ()=>{ mode = mode==='login'?'signup':'login'; updateUI(); });
        document.getElementById('forgotLink').addEventListener('click', (e)=>{ e.preventDefault(); mode='forgot'; updateUI(); });

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.disabled = true;
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            try {
                if (mode === 'recovery') {
                    if (password !== document.getElementById('confirmPassword').value) { showToast('Passwords do not match.', true); btn.disabled=false; return; }
                    const { error } = await _supabase.auth.updateUser({ password });
                    if (error) throw error;
                    showToast('Password updated! Redirecting...');
                    setTimeout(() => window.location.href = 'auth.html', 2000);
                } else if (mode === 'forgot') {
                    const { error } = await _supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/CafeBoss.io/auth.html?type=recovery' });
                    if (error) throw error;
                    showToast('Reset link sent! Check your email.');
                    btn.disabled = false;
                } else if (mode === 'signup') {
                    if (password !== document.getElementById('confirmPassword').value) { showToast('Passwords do not match.', true); btn.disabled=false; return; }
                    const cafeName = document.getElementById('cafeName').value.trim() || 'My Cafe';
                    const { data: signUpData, error } = await _supabase.auth.signUp({ email, password });
                    if (error) {
                        if (error.message.includes('already registered')) showToast('Email already registered. Try logging in.', true);
                        else showToast(error.message, true);
                        btn.disabled = false; return;
                    }
                    if (signUpData.user) {
                        const { error: cafeErr } = await _supabase.from('cafes').insert({ owner_id: signUpData.user.id, cafe_name: cafeName });
                        if (cafeErr && cafeErr.code !== '23505') console.warn(cafeErr);
                    }
                    showToast('Account created! You can now log in.');
                    setTimeout(() => { mode='login'; updateUI(); }, 1500);
                } else {
                    const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    if (data.user) window.location.href = 'dashboard.html';
                }
            } catch (err) { showToast(err.message, true); } finally { btn.disabled = false; }
        });

        if (isRecovery) mode = 'recovery';
        updateUI();
    </script>
</body>
</html>
