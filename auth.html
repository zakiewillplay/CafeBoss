<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Boss | Login</title>
    <style>
        :root { --primary: #FF6B35; --bg: #1a1c1d; --text: #f0f0f0; --card-bg: #2a2a2c; --border: #3a3a3c; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: var(--card-bg); padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid var(--border); }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #888; }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .msg { font-size: 0.9em; margin-top: 10px; text-align: center; color: #ffeb3b; }
        .link { color: var(--primary); cursor: pointer; font-size: 0.9em; display: block; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div id="standard-auth">
            <div class="tabs">
                <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
                <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
            </div>
            <form id="auth-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" id="submit-btn">Login</button>
            </form>
            <span class="link" onclick="showRecovery()">Forgot Password?</span>
        </div>
        
        <div id="recovery-auth" class="hidden">
            <h3 style="text-align:center;">Recovery / Reset</h3>
            <form id="recovery-form">
                <input type="password" id="new-password" placeholder="New Password" required>
                <button type="submit">Update Password</button>
            </form>
            <span class="link" onclick="window.location.href='auth.html'">Back to Login</span>
        </div>
        <div class="msg" id="msg"></div>
    </div>

    <script type="module">
        import { supabase } from './config.js';

        let isLogin = true;
        const urlParams = new URLSearchParams(window.location.search);
        const isRecovery = urlParams.get('type') === 'recovery';

        if (isRecovery) {
            document.getElementById('standard-auth').classList.add('hidden');
            document.getElementById('recovery-auth').classList.remove('hidden');
        }

        window.switchTab = (mode) => {
            isLogin = mode === 'login';
            document.getElementById('tab-login').classList.toggle('active', isLogin);
            document.getElementById('tab-signup').classList.toggle('active', !isLogin);
            document.getElementById('submit-btn').innerText = isLogin ? 'Login' : 'Sign Up';
        };

        window.showRecovery = () => {
            const email = document.getElementById('email').value;
            if(!email) return showMsg('Enter email first to reset password.');
            supabase.auth.resetPasswordForEmail(email, { redirectTo: 'https://zakiewillplay.github.io/CafeBoss/auth.html?type=recovery' })
                .then(({error}) => showMsg(error ? error.message : 'Recovery email sent!'));
        };

        const showMsg = (text) => document.getElementById('msg').innerText = text;

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            showMsg('Processing...');

            if (isLogin) {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) showMsg(error.message);
                else window.location.href = 'dashboard.html';
            } else {
                const { data, error } = await supabase.auth.signUp({ email, password });
                if (error) {
                    if (error.message.includes('already registered')) showMsg("This email is already registered. Try logging in instead.");
                    else showMsg(error.message);
                } else {
                    if(data.user) await supabase.from('cafes').insert([{ owner_id: data.user.id }]);
                    window.location.href = 'dashboard.html';
                }
            }
        });

        document.getElementById('recovery-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const { error } = await supabase.auth.updateUser({ password: newPassword });
            if (error) showMsg(error.message);
            else { showMsg('Password updated!'); setTimeout(() => window.location.href='dashboard.html', 1500); }
        });
    </script>
</body>
</html>
