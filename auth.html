<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Cafe Boss</title>
    <style>
        :root { --bg: #0A0908; --surface: #141210; --primary: #D4AF37; --text: #FDFBF7; --border: #2A2520; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: var(--surface); padding: 30px; width: 100%; max-width: 350px; border: 1px solid var(--border); border-top: 3px solid var(--primary); }
        h2 { text-align: center; color: var(--text); margin-top: 0; font-size: 2rem; margin-bottom: 20px; }
        .tabs { display: flex; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #777; font-size: 0.9rem; text-transform: uppercase; font-weight: bold; border-bottom: 1px solid var(--border); }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; font-size: 1rem; }
        .pwd-wrapper { position: relative; width: 100%; }
        
        /* 🔥 Eye Icon Feature 🔥 */
        .toggle-pwd { position: absolute; right: 10px; top: 12px; cursor: pointer; color: #777; font-size: 1.2rem; user-select: none; }
        
        button { width: 100%; padding: 15px; background: var(--primary); color: var(--bg); border: none; cursor: pointer; font-weight: bold; font-size: 1rem; text-transform: uppercase; margin-top: 5px; }
        .hidden { display: none; }
        .msg { font-size: 0.9rem; margin-top: 15px; text-align: center; color: var(--primary); }
        .link { color: #777; cursor: pointer; font-size: 0.85rem; display: block; text-align: center; margin-top: 20px; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>Cafe Boss</h2>
        <div id="standard-auth">
            <div class="tabs">
                <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
                <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
            </div>
            <form id="auth-form">
                <input type="email" id="email" placeholder="Email Address" required>
                <div class="pwd-wrapper">
                    <input type="password" id="password" placeholder="Password" required>
                    <span class="toggle-pwd" id="toggle-pwd" title="Show/Hide">👁️</span>
                </div>
                <button type="submit" id="submit-btn">Login</button>
            </form>
            <span class="link" onclick="showRecovery()">Forgot Password?</span>
        </div>
        
        <div id="recovery-auth" class="hidden">
            <h3 style="text-align:center;">Reset Password</h3>
            <form id="recovery-form">
                <input type="password" id="new-password" placeholder="New Password" required>
                <button type="submit">Update Password</button>
            </form>
            <span class="link" onclick="window.location.href='auth.html'">Back to Login</span>
        </div>
        <div class="msg" id="msg"></div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        const supabase = createClient('https://udlmyspetkjzcdkfshgl.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkbG15c3BldGtqemNka2ZzaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxODIzMDksImV4cCI6MjA5NDc1ODMwOX0.oQL6hbwjQlU_2h4xcbD-v1yl7EubMz90VpIpTPBwEM4');

        // 🔥 Auto-Login Check 🔥
        supabase.auth.getSession().then(({ data }) => {
            if (data.session) window.location.href = 'dashboard.html';
        });

        // Show/Hide Password
        document.getElementById('toggle-pwd').addEventListener('click', function() {
            const pwdInput = document.getElementById('password');
            if (pwdInput.type === 'password') { pwdInput.type = 'text'; this.innerText = '🙈'; } 
            else { pwdInput.type = 'password'; this.innerText = '👁️'; }
        });

        let isLogin = true;
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('type') === 'recovery') {
            document.getElementById('standard-auth').classList.add('hidden');
            document.getElementById('recovery-auth').classList.remove('hidden');
        }

        window.switchTab = (mode) => {
            isLogin = mode === 'login';
            document.getElementById('tab-login').classList.toggle('active', isLogin);
            document.getElementById('tab-signup').classList.toggle('active', !isLogin);
            document.getElementById('submit-btn').innerText = isLogin ? 'Login' : 'Sign Up';
        };

        window.showRecovery = () => {
            const email = document.getElementById('email').value;
            if(!email) return showMsg('Please enter your email above first.');
            supabase.auth.resetPasswordForEmail(email, { redirectTo: 'https://zakiewillplay.github.io/CafeBoss/auth.html?type=recovery' })
                .then(({error}) => showMsg(error ? error.message : 'Password reset email sent!'));
        };

        const showMsg = (text) => document.getElementById('msg').innerText = text;

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            showMsg('Loading...');

            if (isLogin) {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) showMsg(error.message);
                else window.location.href = 'dashboard.html';
            } else {
                const { data, error } = await supabase.auth.signUp({ email, password });
                if (error) {
                    if (error.message.includes('already registered')) showMsg("Email already used. Try logging in.");
                    else showMsg(error.message);
                } else {
                    if(data.user) await supabase.from('cafes').insert([{ owner_id: data.user.id }]);
                    window.location.href = 'dashboard.html';
                }
            }
        });

        document.getElementById('recovery-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await supabase.auth.updateUser({ password: document.getElementById('new-password').value });
            if (error) showMsg(error.message);
            else { showMsg('Password changed!'); setTimeout(() => window.location.href='dashboard.html', 1500); }
        });
    </script>
</body>
</html>
