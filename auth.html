<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Cafe Boss</title>
    <style>
        :root { --primary: #4F46E5; --bg: #F3F4F6; --surface: #FFFFFF; --text: #111827; --border: #E5E7EB; --radius: 16px; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: var(--surface); padding: 40px; border-radius: var(--radius); width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        h2 { text-align: center; color: var(--primary); margin-top: 0; font-weight: 800; }
        .tabs { display: flex; margin-bottom: 25px; border-bottom: 2px solid var(--border); }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; color: #6B7280; font-weight: 600; transition: 0.2s; }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); margin-bottom: -2px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid var(--border); background: #F9FAFB; color: var(--text); border-radius: 8px; box-sizing: border-box; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--primary); background: #fff; }
        button { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        button:hover { background: #4338CA; }
        .hidden { display: none; }
        .msg { font-size: 0.9em; margin-top: 15px; text-align: center; color: #DC2626; font-weight: 500; }
        .link { color: var(--primary); cursor: pointer; font-size: 0.9em; display: block; text-align: center; margin-top: 15px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>Cafe Boss</h2>
        <div id="standard-auth">
            <div class="tabs">
                <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
                <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
            </div>
            <form id="auth-form">
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" id="submit-btn">Login</button>
            </form>
            <span class="link" onclick="showRecovery()">Forgot Password?</span>
        </div>
        
        <div id="recovery-auth" class="hidden">
            <h3 style="text-align:center;">Reset Password</h3>
            <form id="recovery-form">
                <input type="password" id="new-password" placeholder="New Password" required>
                <button type="submit">Update Password</button>
            </form>
            <span class="link" onclick="window.location.href='auth.html'">Back to Login</span>
        </div>
        <div class="msg" id="msg"></div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        const supabase = createClient('https://udlmyspetkjzcdkfshgl.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkbG15c3BldGtqemNka2ZzaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxODIzMDksImV4cCI6MjA5NDc1ODMwOX0.oQL6hbwjQlU_2h4xcbD-v1yl7EubMz90VpIpTPBwEM4');

        let isLogin = true;
        const urlParams = new URLSearchParams(window.location.search);
        const isRecovery = urlParams.get('type') === 'recovery';

        if (isRecovery) {
            document.getElementById('standard-auth').classList.add('hidden');
            document.getElementById('recovery-auth').classList.remove('hidden');
        }

        window.switchTab = (mode) => {
            isLogin = mode === 'login';
            document.getElementById('tab-login').classList.toggle('active', isLogin);
            document.getElementById('tab-signup').classList.toggle('active', !isLogin);
            document.getElementById('submit-btn').innerText = isLogin ? 'Login to Dashboard' : 'Create Free Account';
        };

        window.showRecovery = () => {
            const email = document.getElementById('email').value;
            if(!email) return showMsg('Enter your email first to reset password.');
            supabase.auth.resetPasswordForEmail(email, { redirectTo: 'https://zakiewillplay.github.io/CafeBoss/auth.html?type=recovery' })
                .then(({error}) => showMsg(error ? error.message : 'Recovery email sent!'));
        };

        const showMsg = (text) => document.getElementById('msg').innerText = text;

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            showMsg('Processing...');

            if (isLogin) {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) showMsg(error.message);
                else window.location.href = 'dashboard.html';
            } else {
                const { data, error } = await supabase.auth.signUp({ email, password });
                if (error) {
                    if (error.message.includes('already registered')) showMsg("This email is already registered. Try logging in instead.");
                    else showMsg(error.message);
                } else {
                    if(data.user) await supabase.from('cafes').insert([{ owner_id: data.user.id }]);
                    window.location.href = 'dashboard.html';
                }
            }
        });

        document.getElementById('recovery-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const { error } = await supabase.auth.updateUser({ password: newPassword });
            if (error) showMsg(error.message);
            else { showMsg('Password updated successfully!'); setTimeout(() => window.location.href='dashboard.html', 1500); }
        });
    </script>
</body>
</html>
