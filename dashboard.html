<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/CafeBoss/manifest.json">
    <title>Cafe Boss – Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --primary: #FF6B35; --bg: #0f0f13; --card: rgba(25,25,30,0.85);
            --border: rgba(255,255,255,0.08); --text: #f0f0f0; --muted: #a0a0b0;
        }
        body.light-mode {
            --bg: #f2f1ed; --card: rgba(255,255,255,0.9); --border: rgba(0,0,0,0.12); --text: #1a1a1a; --muted: #555;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width: 100%; overflow-x: hidden; }
        body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); transition:0.4s; }
        .toast-container { position:fixed; top:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:10px; }
        .toast { background:#27ae60; color:#fff; padding:0.9rem 1.5rem; border-radius:12px; transform:translateX(120%); transition:0.3s; }
        .toast.show { transform:translateX(0); } .toast.error { background:#c0392b; }
        header { background:var(--card); border-bottom:1px solid var(--border); padding:1rem 1.5rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem; }
        .logo { font-weight:700; font-size:1.3rem; color:var(--primary); white-space: nowrap; }
        button, select, input, textarea { padding:0.5rem 0.8rem; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text); cursor:pointer; font-size:0.85rem; font-family:inherit; transition:0.2s; }
        button:hover { border-color:var(--primary); }
        .container { width: 100%; max-width:1200px; margin:1.5rem auto; padding:0 1rem; display:grid; gap:1.5rem; }
        .stats-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(130px,1fr)); gap:1rem; }
        .stat-card { background:var(--card); border-radius:14px; padding:1.2rem; text-align:center; }
        .stat-num { font-size:2rem; font-weight:700; color:var(--primary); }
        .card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:1.2rem; }
        .card h3 { cursor:pointer; display:flex; align-items:center; gap:0.5rem; font-size:1rem; user-select:none; }
        .collapsed .card-content { display:none; }
        .order-tabs { display:flex; margin-bottom:0.8rem; border-radius:8px; overflow:hidden; border:1px solid var(--border); }
        .order-tabs button { flex:1; padding:0.5rem; border:none; background:transparent; color:var(--muted); font-weight:600; font-size:0.8rem; }
        .order-tabs button.active { background:var(--primary); color:#fff; }
        .order-card { background:rgba(0,0,0,0.2); border-radius:10px; padding:0.8rem; margin-bottom:0.6rem; }
        .item-row { display:flex; align-items:center; gap:0.8rem; background:rgba(0,0,0,0.2); padding:0.6rem; border-radius:8px; margin-bottom:0.4rem; flex-wrap:wrap; }
        .badge { display:inline-block; padding:2px 6px; border-radius:4px; font-size:0.65rem; }
        .badge-discount { background:#c0392b; color:#fff; } .badge-featured { background:#f39c12; color:#000; }
        .toggle-switch { position:relative; width:40px; height:22px; }
        .toggle-switch input { opacity:0; width:0; height:0; }
        .toggle-slider { position:absolute; top:0;left:0;right:0;bottom:0; background:#555; border-radius:22px; transition:0.3s; }
        .toggle-slider:before { content:""; height:16px; width:16px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:0.3s; }
        input:checked+.toggle-slider { background:#27ae60; }
        input:checked+.toggle-slider:before { transform:translateX(18px); }
        .qr-display img { border-radius:12px; background:#fff; padding:0.5rem; }
        .btn-sm { padding:0.35rem 0.8rem; font-size:0.75rem; }
        .flex-row { display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; }
        .header-actions { display:flex; gap:0.4rem; align-items:center; flex-wrap:wrap; }
        .orders-toolbar { display:flex; gap:0.5rem; align-items:center; margin-bottom:0.8rem; flex-wrap:wrap; }
        .orders-toolbar input { flex:1; min-width:150px; }
        .menu-search { width: 100%; margin-bottom: 0.8rem; }
        .realtime-indicator { font-size:0.7rem; padding:0.2rem 0.5rem; border-radius:12px; margin-left:0.5rem; }
        .connected { background:#27ae60; color:#fff; }
        .disconnected { background:#c0392b; color:#fff; }
        @media (max-width: 500px) {
            header { flex-direction: column; align-items: flex-start; }
            .container { padding: 0 0.8rem; }
        }
    </style>
</head>
<body class="light-mode">
    <div class="toast-container" id="toastContainer"></div>
    <header>
        <div class="logo">☕ Cafe Boss <span id="realtimeStatus" class="realtime-indicator disconnected">⚫ Offline</span></div>
        <div class="header-actions">
            <select id="langSelect"><option value="en">EN</option><option value="hi">हि</option></select>
            <button id="themeToggle">🌙</button>
            <button id="unmuteBtn">🔊</button>
            <button id="notifBtn" style="display:none;">🔔</button>
            <button id="testAlertBtn" title="Test sound & notification">📢</button>
            <button id="livePreviewBtn">👁️</button>
            <button id="installAppBtn" style="background:var(--primary); color:#fff; font-weight:600; display:inline-flex;">📲 Add to Phone</button>
            <button id="logoutBtn" style="color:#f87171;">↪</button>
        </div>
    </header>
    <div class="container">
        <div class="stats-row">
            <div class="stat-card"><div class="stat-num" id="statViews">0</div><div>Views</div></div>
            <div class="stat-card"><div class="stat-num" id="statItems">0</div><div>Items</div></div>
            <div class="stat-card"><div class="stat-num" id="statOrders">0</div><div>Orders</div></div>
        </div>
        <div class="card collapsed" id="analyticsCard">
            <h3>📊 Analytics <span>▼</span></h3>
            <div class="card-content">
                <div class="flex-row" style="margin-bottom:0.5rem;">
                    <button id="weekBtn" class="btn-sm active" style="background:var(--primary);">Week</button>
                    <button id="monthBtn" class="btn-sm">Month</button>
                </div>
                <canvas id="ordersChart" height="200"></canvas>
            </div>
        </div>
        <div class="card" id="ordersCard">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.8rem;">
                <h3 style="margin:0;">📋 Orders</h3>
                <button id="refreshOrdersBtn" class="btn-sm" title="Refresh orders">↻ Refresh</button>
            </div>
            <div class="card-content">
                <div class="orders-toolbar">
                    <input type="text" id="orderSearch" placeholder="🔍 Search table or customer...">
                    <button id="exportCsvBtn" class="btn-sm" title="Export to CSV">📥 CSV</button>
                    <button id="printTabBtn" class="btn-sm" title="Print all visible orders" style="display:none;">🖨️ Print All</button>
                </div>
                <div class="order-tabs">
                    <button class="active" data-tab="new">New</button>
                    <button data-tab="accepted">Accepted</button>
                    <button data-tab="completed">Completed</button>
                </div>
                <div id="ordersList"></div>
            </div>
        </div>
        <div class="card collapsed" id="settingsCard"><h3>⚙️ Settings</h3><div class="card-content"><input id="setCafeName" placeholder="Cafe name"><input id="setWhatsapp" placeholder="WhatsApp"><textarea id="setDesc" rows="2"></textarea><div class="flex-row"><input type="color" id="setPrimary" value="#FF6B35"><input type="color" id="setAccent" value="#2F3E46"></div><button id="saveSettingsBtn">Save</button></div></div>
        <div class="card collapsed" id="qrCard"><h3>📱 QR Code</h3><div class="card-content"><button id="generateQrBtn">Generate QR</button><div id="qrDisplay" class="qr-display"></div><p id="qrUrl" style="word-break:break-all; font-size:0.8rem;"></p><button id="copyQrLink" style="display:none;">📋 Copy Link</button></div></div>
        <div class="card" id="addItemCard">
            <h3>➕ Add Item <span>▼</span></h3>
            <div class="card-content">
                <input type="hidden" id="editItemId">
                <div class="flex-row" style="margin-bottom:0.5rem;">
                    <input id="itemName" placeholder="Item name *" style="flex:2;">
                    <input type="number" id="itemPrice" step="0.01" placeholder="Price ₹" style="width:100px;">
                </div>
                <div class="flex-row" style="margin-bottom:0.5rem;">
                    <select id="itemCategorySelect" class="select-cat" style="flex:1;">
                        <option value="Uncategorized">Uncategorized</option>
                        <option value="__new__">+ Add new…</option>
                    </select>
                    <input id="itemDiscount" placeholder="Discount" style="flex:1;">
                </div>
                <input id="itemCategoryInput" placeholder="New category name" style="display:none; margin-bottom:0.5rem;">
                <textarea id="itemDesc" placeholder="Description (optional)" rows="2" style="margin-bottom:0.5rem;"></textarea>
                <div class="flex-row" style="margin-bottom:0.5rem;">
                    <button id="aiDescBtn" class="btn-sm">✨ AI</button>
                    <label style="display:flex; align-items:center; gap:0.3rem; cursor:pointer; font-size:0.85rem;">
                        <input type="checkbox" id="itemFeatured"> 🔥 Chef's Special
                    </label>
                </div>
                <div id="variantsContainer" style="margin-bottom:0.5rem;">
                    <div class="flex-row" style="margin-bottom:0.3rem;">
                        <input class="var-name" placeholder="Size" style="flex:1;">
                        <input class="var-price" type="number" step="0.01" placeholder="Price" style="flex:1;">
                        <button class="remove-var btn-sm">✕</button>
                    </div>
                </div>
                <button id="addVariantBtn" class="btn-sm">+ Variant</button>
                <div class="flex-row" style="margin-top:0.8rem; gap:0.5rem;">
                    <button id="submitItemBtn" style="flex:1;">Save Item</button>
                    <button id="saveAndNextBtn" style="flex:1; background:var(--primary);">Save & Add Next</button>
                </div>
            </div>
        </div>
        <div class="card" id="menuItemsCard">
            <h3>📋 Menu Items <span>▼</span></h3>
            <div class="card-content">
                <input type="text" id="menuSearch" class="menu-search" placeholder="🔍 Search items by name, category, or description...">
                <div id="menuItemsList"></div>
            </div>
        </div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/CafeBoss/sw.js')
                .then(reg => console.log('SW registered'))
                .catch(err => console.log('SW registration failed', err));
        }

        // ====== RELIABLE INSTALL LOGIC ======
        const installBtn = document.getElementById('installAppBtn');
        let deferredPrompt = null;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.textContent = '📲 Install App';
        });

        installBtn.addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        toast('App installed successfully!');
                    }
                    deferredPrompt = null;
                });
            } else {
                alert('To install Cafe Boss:\n\n1. Tap the three‑dot menu (⋮) in Chrome.\n2. Select “Install app” or “Add to Home screen”.\n\nIf you only see “Create shortcut”, visit the dashboard a few more times – the install option will appear soon.');
            }
        });

        const SUPABASE_URL = 'https://pbbybxdxnvzhjtkpfpej.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiYnlieGR4bnZ6aGp0a3BmcGVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQ0ODksImV4cCI6MjA5NDk0MDQ4OX0.u3VWUTu633pKfZ5Y8jpe2FUX4Gf9NGAKCsBGXqGTtao';
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const BASE_URL = 'https://zakiewillplay.github.io/CafeBoss/menu.html?id=';
        const jsPDF = window.jspdf?.jsPDF || window.jspdf;

        function toast(msg, err=false) {
            const el = document.createElement('div');
            el.className = 'toast ' + (err ? 'error' : '') + ' show';
            el.textContent = msg;
            document.getElementById('toastContainer').appendChild(el);
            setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 3000);
        }

        function applyTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.body.classList.remove('light-mode');
                document.getElementById('themeToggle').textContent = '☀️';
            } else {
                document.body.classList.add('light-mode');
                document.getElementById('themeToggle').textContent = '🌙';
            }
        }
        document.getElementById('themeToggle').addEventListener('click', () => { document.body.classList.toggle('light-mode'); localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark'); applyTheme(); });
        applyTheme();

        let audioCtx, audioReady = false;
        const unmuteBtn = document.getElementById('unmuteBtn');
        const notifBtn = document.getElementById('notifBtn');
        const realtimeStatus = document.getElementById('realtimeStatus');

        unmuteBtn.addEventListener('click', () => {
            try {
                audioCtx = new (window.AudioContext||window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                audioReady = true;
                unmuteBtn.style.display = 'none';
            } catch(e) { toast('Audio not supported', true); }
        });

        function beep() {
            if (!audioReady) {
                try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); audioReady = true; unmuteBtn.style.display = 'none'; } catch(e) { return; }
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.value = 800; g.gain.value = 0.3;
            o.start(); o.stop(audioCtx.currentTime + 0.15);
        }

        if ('Notification' in window) {
            const requestNotif = () => {
                if (Notification.permission === 'default') {
                    Notification.requestPermission().then(perm => {
                        if (perm === 'granted') {
                            notifBtn.style.display = 'none';
                            toast('Alerts enabled!');
                        } else {
                            notifBtn.style.display = 'inline-flex';
                            notifBtn.textContent = '🔕';
                            toast('Notifications denied.', true);
                        }
                    });
                } else if (Notification.permission === 'denied') {
                    notifBtn.style.display = 'inline-flex';
                    notifBtn.textContent = '🔕';
                } else if (Notification.permission === 'granted') {
                    notifBtn.style.display = 'none';
                }
            };
            notifBtn.addEventListener('click', requestNotif);
            document.addEventListener('click', function once() {
                if (Notification.permission === 'default') requestNotif();
            }, { once: true });
            if (Notification.permission !== 'granted') {
                notifBtn.style.display = 'inline-flex';
                notifBtn.textContent = Notification.permission === 'denied' ? '🔕' : '🔔';
            }
        }

        document.getElementById('testAlertBtn').addEventListener('click', () => {
            beep();
            if (Notification.permission === 'granted') {
                new Notification('Test Alert', { body:'Sound and notifications are working!', icon:'☕' });
            } else {
                toast('Notification permission not granted. Enable alerts first.', true);
            }
            toast('Test beep played!');
        });

        document.getElementById('logoutBtn').addEventListener('click', () => _supabase.auth.signOut().then(() => window.location.href='index.html'));
        document.getElementById('livePreviewBtn').addEventListener('click', () => { if (cafeData?.id) window.open(BASE_URL + cafeData.id, '_blank'); else toast('Cafe not ready', true); });
        document.querySelectorAll('.card h3').forEach(h => h.addEventListener('click', () => h.parentElement.classList.toggle('collapsed')));

        let cafeData = null, allOrders = [], allItems = [], activeOrderTab = 'new', chartInstance = null, analyticsMode = 'week';
        let realtimeChannel = null;

        async function getOrCreateCafe(uid) {
            const { data } = await _supabase.from('cafes').select('*').eq('owner_id', uid).maybeSingle();
            if (data) return data;
            const { data: ins } = await _supabase.from('cafes').insert({ owner_id: uid, cafe_name: 'My Cafe' }).select().maybeSingle();
            return ins || { id: null, cafe_name:'My Cafe', _temp:true };
        }

        async function init() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href='auth.html'; return; }
            cafeData = await getOrCreateCafe(user.id);
            if (cafeData._temp) toast('Cafe profile not ready. Please reload.', true);
            document.getElementById('setCafeName').value = cafeData.cafe_name||'';
            document.getElementById('setWhatsapp').value = cafeData.whatsapp||'';
            document.getElementById('setDesc').value = cafeData.description||'';
            document.getElementById('setPrimary').value = cafeData.primary_color||'#FF6B35';
            document.getElementById('setAccent').value = cafeData.accent_color||'#2F3E46';
            await Promise.all([loadStats(), loadOrders(), loadItems(), loadAnalytics()]);
            if (cafeData.id && !cafeData._temp) {
                setupRealtime();
            } else {
                setTimeout(async () => {
                    if (!cafeData.id || cafeData._temp) {
                        cafeData = await getOrCreateCafe(user.id);
                        if (cafeData.id && !cafeData._temp) {
                            await Promise.all([loadStats(), loadOrders(), loadItems(), loadAnalytics()]);
                            setupRealtime();
                            toast('Cafe profile ready!', false);
                        }
                    }
                }, 2000);
            }
        }

        document.getElementById('refreshOrdersBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            loadOrders();
            toast('Orders refreshed');
        });

        document.getElementById('orderSearch').addEventListener('input', () => renderOrders());

        function updatePrintButton() {
            const printTabBtn = document.getElementById('printTabBtn');
            if (activeOrderTab === 'completed') {
                printTabBtn.style.display = 'inline-flex';
                printTabBtn.textContent = '🖨️ Print Completed';
            } else if (activeOrderTab === 'new') {
                printTabBtn.style.display = 'inline-flex';
                printTabBtn.textContent = '🖨️ Print New';
            } else {
                printTabBtn.style.display = 'none';
            }
        }

        document.getElementById('saveSettingsBtn').addEventListener('click', async () => {
            if (!cafeData.id) return toast('Cafe not ready', true);
            const u = { cafe_name: document.getElementById('setCafeName').value.trim(), whatsapp: document.getElementById('setWhatsapp').value.trim(), description: document.getElementById('setDesc').value.trim(), primary_color: document.getElementById('setPrimary').value, accent_color: document.getElementById('setAccent').value };
            const { error } = await _supabase.from('cafes').update(u).eq('id', cafeData.id);
            if (error) toast('Save failed', true);
            else { Object.assign(cafeData, u); toast('Settings saved'); }
        });

        document.getElementById('generateQrBtn').addEventListener('click', () => {
            if (!cafeData.id) return toast('Cafe not ready', true);
            const url = BASE_URL + cafeData.id;
            document.getElementById('qrDisplay').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(url)}" width="250" height="250">`;
            document.getElementById('qrUrl').textContent = url;
            document.getElementById('copyQrLink').style.display = 'inline-block';
        });
        document.getElementById('copyQrLink').addEventListener('click', () => { navigator.clipboard.writeText(document.getElementById('qrUrl').textContent); toast('Link copied!'); });

        async function loadStats() {
            if (!cafeData.id || cafeData._temp) return;
            const [{ count: items }, { count: orders }, { count: views }] = await Promise.all([
                _supabase.from('menu_items').select('*', { count:'exact', head:true }).eq('cafe_id', cafeData.id),
                _supabase.from('orders').select('*', { count:'exact', head:true }).eq('cafe_id', cafeData.id),
                _supabase.from('menu_views_log').select('*', { count:'exact', head:true }).eq('cafe_id', cafeData.id)
            ]);
            document.getElementById('statViews').textContent = views||0;
            document.getElementById('statItems').textContent = items||0;
            document.getElementById('statOrders').textContent = orders||0;
        }

        async function loadOrders() {
            if (!cafeData.id) return;
            const { data, error } = await _supabase.from('orders').select('*').eq('cafe_id', cafeData.id).order('created_at', { ascending: false });
            if (error) { toast('Failed to load orders', true); return; }
            allOrders = data||[]; renderOrders();
        }

        function renderOrders() {
            const searchTerm = document.getElementById('orderSearch')?.value.toLowerCase() || '';
            let filtered = allOrders.filter(o => (activeOrderTab==='new'&&o.status==='new')||(activeOrderTab==='accepted'&&o.status==='accepted')||(activeOrderTab==='completed'&&(o.status==='delivered'||o.status==='completed')));
            if (searchTerm) {
                filtered = filtered.filter(o => 
                    (o.table_number||'').toLowerCase().includes(searchTerm) || 
                    (o.customer_name||'').toLowerCase().includes(searchTerm)
                );
            }
            const list = document.getElementById('ordersList');
            if (!filtered.length) { list.innerHTML = '<p style="color:var(--muted); text-align:center;">No orders found.</p>'; return; }
            list.innerHTML = filtered.map(o => {
                const items = typeof o.items === 'string' ? JSON.parse(o.items) : o.items;
                const itemStr = Array.isArray(items) ? items.map(i => i.name+' x'+(i.qty||1)).join(', ') : '';
                const time = new Date(o.created_at).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
                let actions = '';
                if (o.status==='new') actions = `<button data-action="accept" data-id="${o.id}">Accept</button>`;
                if (o.status==='accepted') actions = `<button data-action="deliver" data-id="${o.id}">Deliver</button>`;
                if (o.status==='delivered'||o.status==='completed') actions = `<button data-action="pdf" data-id="${o.id}">PDF</button><button data-action="print" data-id="${o.id}">Print</button>`;
                return `<div class="order-card"><div class="order-meta"><span>Table: ${o.table_number||'N/A'}</span><span>${time}</span><span>${o.customer_name||'Guest'}</span></div><div>${itemStr}</div><div style="font-weight:700;">Total: ₹${parseFloat(o.total).toFixed(2)}</div><div>${actions}</div></div>`;
            }).join('');
            document.querySelectorAll('[data-action="accept"]').forEach(b => b.addEventListener('click', async ()=>{ await _supabase.from('orders').update({status:'accepted'}).eq('id',b.dataset.id); loadOrders(); }));
            document.querySelectorAll('[data-action="deliver"]').forEach(b => b.addEventListener('click', async ()=>{ await _supabase.from('orders').update({status:'delivered'}).eq('id',b.dataset.id); loadOrders(); }));
            document.querySelectorAll('[data-action="pdf"]').forEach(b => b.addEventListener('click', () => { const o = allOrders.find(o=>o.id===b.dataset.id); if(o) downloadPDF(o); }));
            document.querySelectorAll('[data-action="print"]').forEach(b => b.addEventListener('click', () => { const o = allOrders.find(o=>o.id===b.dataset.id); if(o) printSingleOrder(o); }));
        }

        function exportCSV() {
            const ordersToExport = allOrders.filter(o => (activeOrderTab==='new'&&o.status==='new')||(activeOrderTab==='accepted'&&o.status==='accepted')||(activeOrderTab==='completed'&&(o.status==='delivered'||o.status==='completed')));
            if (!ordersToExport.length) { toast('No orders to export', true); return; }
            let csv = 'Date,Time,Table,Customer,Items,Total,Status\n';
            ordersToExport.forEach(o => {
                const items = typeof o.items === 'string' ? JSON.parse(o.items) : o.items;
                const itemStr = Array.isArray(items) ? items.map(i => i.name+' x'+(i.qty||1)).join('; ') : '';
                const date = new Date(o.created_at).toLocaleDateString('en-IN');
                const time = new Date(o.created_at).toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
                csv += `"${date}","${time}","${o.table_number||''}","${o.customer_name||''}","${itemStr}","${o.total}","${o.status}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `orders_${new Date().toISOString().slice(0,10)}.csv`; a.click();
            URL.revokeObjectURL(url);
            toast('CSV exported!');
        }
        document.getElementById('exportCsvBtn').addEventListener('click', exportCSV);

        document.getElementById('printTabBtn').addEventListener('click', () => {
            const ordersToPrint = allOrders.filter(o => (activeOrderTab==='new'&&o.status==='new')||(activeOrderTab==='completed'&&(o.status==='delivered'||o.status==='completed')));
            if (!ordersToPrint.length) { toast(`No ${activeOrderTab} orders to print`, true); return; }
            let html = `<html><body style="font-family:sans-serif; padding:20px;"><h2>${activeOrderTab.charAt(0).toUpperCase()+activeOrderTab.slice(1)} Orders</h2>`;
            ordersToPrint.forEach(o => {
                const items = typeof o.items === 'string' ? JSON.parse(o.items) : o.items;
                const itemStr = Array.isArray(items) ? items.map(i => i.name+' x'+(i.qty||1)).join(', ') : '';
                html += `<div style="border:1px solid #ccc; padding:10px; margin-bottom:10px;"><p>Table: ${o.table_number||'N/A'} | ${o.customer_name||'Guest'}</p><p>${itemStr}</p><p>Total: ₹${parseFloat(o.total).toFixed(2)}</p></div>`;
            });
            html += `</body></html>`;
            const w = window.open('', '_blank'); w.document.write(html); w.document.close(); w.focus(); w.print();
        });

        function downloadPDF(order) {
            if (!jsPDF) return toast('PDF library not loaded', true);
            const doc = new jsPDF();
            const items = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
            doc.setFontSize(16); doc.text('Cafe Boss - Bill', 20, 20);
            doc.setFontSize(11); doc.text(`Table: ${order.table_number||'N/A'}  Customer: ${order.customer_name||'Guest'}`, 20, 30);
            let y=50;
            if (Array.isArray(items)) items.forEach(i => { doc.text(`${i.name} x${i.qty||1} - ₹${(i.price*(i.qty||1)).toFixed(2)}`, 20, y); y+=8; });
            doc.line(20, y, 190, y); y+=8;
            doc.setFontSize(13); doc.text(`Total: ₹${parseFloat(order.total).toFixed(2)}`, 20, y);
            doc.save(`bill_${order.id.slice(0,8)}.pdf`);
        }

        function printSingleOrder(order) {
            const items = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
            let html = `<html><body style="font-family:sans-serif;padding:20px;"><h2>Cafe Boss - Bill</h2><p>Table: ${order.table_number||'N/A'} | Customer: ${order.customer_name||'Guest'}</p><p>Date: ${new Date(order.created_at).toLocaleString()}</p><hr>`;
            if (Array.isArray(items)) items.forEach(i => { html += `<p>${i.name} x${i.qty||1} - ₹${(i.price*(i.qty||1)).toFixed(2)}</p>`; });
            html += `<hr><h3>Total: ₹${parseFloat(order.total).toFixed(2)}</h3></body></html>`;
            const w = window.open('', '_blank'); w.document.write(html); w.document.close(); w.focus(); w.print();
        }

        function setupRealtime() {
            if (realtimeChannel) {
                _supabase.removeChannel(realtimeChannel);
            }
            realtimeChannel = _supabase.channel('orders-realtime')
                .on('postgres_changes', { event:'INSERT', schema:'public', table:'orders', filter:`cafe_id=eq.${cafeData.id}` }, payload => {
                    allOrders.unshift(payload.new);
                    renderOrders();
                    beep();
                    loadStats();
                    if (Notification.permission === 'granted') new Notification('New Order!', { body:'A new order has been placed.', icon:'☕' });
                    else toast('New order received!', false);
                })
                .subscribe((status) => {
                    if (status === 'SUBSCRIBED') {
                        realtimeStatus.textContent = '🟢 Live';
                        realtimeStatus.className = 'realtime-indicator connected';
                    } else if (status === 'CHANNEL_ERROR') {
                        realtimeStatus.textContent = '🔴 Offline';
                        realtimeStatus.className = 'realtime-indicator disconnected';
                        toast('Realtime connection error – refresh if orders don\'t appear', true);
                    }
                });
        }

        async function loadAnalytics() {
            if (!cafeData.id) return;
            const days = analyticsMode === 'week' ? 7 : 30;
            const startDate = new Date(Date.now()-days*86400000).toISOString();
            const { data } = await _supabase.from('orders').select('created_at').eq('cafe_id', cafeData.id).gte('created_at', startDate).order('created_at');
            const labels = {};
            for (let i=days-1; i>=0; i--) { const d = new Date(Date.now()-i*86400000); labels[d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})] = 0; }
            (data||[]).forEach(o => { const k = new Date(o.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short'}); if (labels[k]!==undefined) labels[k]++; });
            const ctx = document.getElementById('ordersChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, { type:'line', data:{ labels:Object.keys(labels), datasets:[{ label:'Orders', data:Object.values(labels), borderColor:'#FF6B35', backgroundColor:'rgba(255,107,53,0.1)', fill:true, tension:0.3 }] } });
        }

        document.getElementById('weekBtn').addEventListener('click', () => {
            analyticsMode = 'week';
            document.getElementById('weekBtn').style.background = 'var(--primary)';
            document.getElementById('monthBtn').style.background = '';
            loadAnalytics();
        });
        document.getElementById('monthBtn').addEventListener('click', () => {
            analyticsMode = 'month';
            document.getElementById('monthBtn').style.background = 'var(--primary)';
            document.getElementById('weekBtn').style.background = '';
            loadAnalytics();
        });

        // ========== ITEMS WITH SEARCH ==========
        async function loadItems() {
            if (!cafeData.id) { allItems=[]; renderItems(); return; }
            const { data } = await _supabase.from('menu_items').select('*').eq('cafe_id', cafeData.id).order('category');
            allItems = data||[]; renderItems(); updateCategoryDropdown();
        }

        function updateCategoryDropdown() {
            const cats = [...new Set(allItems.map(i=>i.category).filter(Boolean))].sort();
            const select = document.getElementById('itemCategorySelect');
            select.innerHTML = '<option value="Uncategorized">Uncategorized</option>' +
                cats.map(c => `<option value="${c}">${c}</option>`).join('') +
                '<option value="__new__">+ Add new…</option>';
            select.value = 'Uncategorized';
            document.getElementById('itemCategoryInput').style.display = 'none';
        }

        function renderItems() {
            const searchTerm = document.getElementById('menuSearch')?.value.toLowerCase() || '';
            const filtered = allItems.filter(item =>
                !searchTerm ||
                item.name.toLowerCase().includes(searchTerm) ||
                item.category.toLowerCase().includes(searchTerm) ||
                (item.description||'').toLowerCase().includes(searchTerm)
            );
            const list = document.getElementById('menuItemsList');
            if (!filtered.length) { list.innerHTML = '<p style="color:var(--muted);">No items match your search.</p>'; return; }
            list.innerHTML = filtered.map(item => {
                let badges = '';
                if (item.discount) badges += `<span class="badge badge-discount">${item.discount}</span> `;
                if (item.featured) badges += `<span class="badge badge-featured">🔥</span>`;
                const hasVariants = item.description?.startsWith('VAR::');
                let variantInfo = '';
                if (hasVariants) variantInfo = item.description.replace('VAR::','').split('|').map(v => { const [n,p]=v.split('='); return `<span style="font-size:0.7rem;">${n}:₹${p}</span>`; }).join(' ');
                return `<div class="item-row">
                    <div style="flex:1;"><strong>${item.name}</strong> ${badges}<div style="font-size:0.75rem;">${hasVariants?variantInfo:(item.description||'')}</div><div style="font-size:0.8rem;">${item.category} | ₹${item.price}</div></div>
                    <label class="toggle-switch"><input type="checkbox" ${item.available?'checked':''} data-id="${item.id}" class="toggle-avail"><span class="toggle-slider"></span></label>
                    <button class="edit-item-btn btn-sm" data-id="${item.id}">Edit</button>
                    <button class="copy-item-btn btn-sm" data-id="${item.id}" title="Duplicate">📋</button>
                    <button class="delete-item-btn btn-sm" data-id="${item.id}" style="color:#f87171;">Del</button>
                </div>`;
            }).join('');
            document.querySelectorAll('.toggle-avail').forEach(cb => cb.addEventListener('change', async function(){ await _supabase.from('menu_items').update({available:this.checked}).eq('id',this.dataset.id); loadItems(); }));
            document.querySelectorAll('.edit-item-btn').forEach(b => b.addEventListener('click', ()=> editItem(b.dataset.id)));
            document.querySelectorAll('.copy-item-btn').forEach(b => b.addEventListener('click', ()=> duplicateItem(b.dataset.id)));
            document.querySelectorAll('.delete-item-btn').forEach(b => b.addEventListener('click', async ()=>{ if(confirm('Delete?')){ await _supabase.from('menu_items').delete().eq('id',b.dataset.id); loadItems(); loadStats(); } }));
        }

        document.getElementById('menuSearch').addEventListener('input', () => renderItems());

        function editItem(id) {
            const item = allItems.find(i=>i.id===id); if(!item) return;
            document.getElementById('editItemId').value = item.id;
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemPrice').value = item.price;
            const select = document.getElementById('itemCategorySelect');
            const input = document.getElementById('itemCategoryInput');
            if ([...select.options].some(opt => opt.value === item.category)) {
                select.value = item.category;
                input.style.display = 'none';
            } else {
                select.value = '__new__';
                input.style.display = 'block';
                input.value = item.category;
            }
            document.getElementById('itemDiscount').value = item.discount||'';
            document.getElementById('itemFeatured').checked = item.featured||false;
            document.getElementById('variantsContainer').innerHTML = '';
            if (item.description?.startsWith('VAR::')) {
                item.description.replace('VAR::','').split('|').forEach(v => {
                    const [n,p]=v.split('=');
                    const row = document.createElement('div'); row.className='flex-row'; row.style.marginBottom='0.3rem'; row.innerHTML=`<input class="var-name" value="${n}" style="flex:1"><input class="var-price" type="number" step="0.01" value="${p}" style="flex:1"><button class="remove-var btn-sm">✕</button>`;
                    document.getElementById('variantsContainer').appendChild(row);
                    row.querySelector('.remove-var').addEventListener('click', ()=>row.remove());
                });
            } else {
                const row = document.createElement('div'); row.className='flex-row'; row.style.marginBottom='0.3rem'; row.innerHTML='<input class="var-name" placeholder="Size" style="flex:1"><input class="var-price" type="number" step="0.01" placeholder="Price" style="flex:1"><button class="remove-var btn-sm">✕</button>';
                document.getElementById('variantsContainer').appendChild(row);
                row.querySelector('.remove-var').addEventListener('click', ()=>row.remove());
            }
            document.getElementById('itemDesc').value = item.description?.startsWith('VAR::') ? '' : (item.description||'');
            document.getElementById('submitItemBtn').textContent = 'Update Item';
            document.getElementById('saveAndNextBtn').style.display = 'none';
            document.getElementById('addItemCard').classList.remove('collapsed');
        }

        function duplicateItem(id) {
            const item = allItems.find(i=>i.id===id); if(!item) return;
            document.getElementById('editItemId').value = '';
            document.getElementById('itemName').value = item.name + ' (copy)';
            document.getElementById('itemPrice').value = item.price;
            const select = document.getElementById('itemCategorySelect');
            const input = document.getElementById('itemCategoryInput');
            if ([...select.options].some(opt => opt.value === item.category)) {
                select.value = item.category;
                input.style.display = 'none';
            } else {
                select.value = '__new__';
                input.style.display = 'block';
                input.value = item.category;
            }
            document.getElementById('itemDiscount').value = item.discount||'';
            document.getElementById('itemFeatured').checked = item.featured||false;
            document.getElementById('itemDesc').value = item.description?.startsWith('VAR::') ? '' : (item.description||'');
            document.getElementById('variantsContainer').innerHTML = '';
            if (item.description?.startsWith('VAR::')) {
                item.description.replace('VAR::','').split('|').forEach(v => {
                    const [n,p]=v.split('=');
                    const row = document.createElement('div'); row.className='flex-row'; row.style.marginBottom='0.3rem'; row.innerHTML=`<input class="var-name" value="${n}" style="flex:1"><input class="var-price" type="number" step="0.01" value="${p}" style="flex:1"><button class="remove-var btn-sm">✕</button>`;
                    document.getElementById('variantsContainer').appendChild(row);
                    row.querySelector('.remove-var').addEventListener('click', ()=>row.remove());
                });
            } else {
                const row = document.createElement('div'); row.className='flex-row'; row.style.marginBottom='0.3rem'; row.innerHTML='<input class="var-name" placeholder="Size" style="flex:1"><input class="var-price" type="number" step="0.01" placeholder="Price" style="flex:1"><button class="remove-var btn-sm">✕</button>';
                document.getElementById('variantsContainer').appendChild(row);
                row.querySelector('.remove-var').addEventListener('click', ()=>row.remove());
            }
            document.getElementById('submitItemBtn').textContent = 'Add Item';
            document.getElementById('saveAndNextBtn').style.display = 'inline-flex';
            document.getElementById('addItemCard').classList.remove('collapsed');
        }

        document.getElementById('itemCategorySelect').addEventListener('change', function() {
            const input = document.getElementById('itemCategoryInput');
            if (this.value === '__new__') { input.style.display = 'block'; input.value = ''; input.focus(); }
            else input.style.display = 'none';
        });

        document.getElementById('addVariantBtn').addEventListener('click', ()=>{
            const row = document.createElement('div'); row.className='flex-row'; row.style.marginBottom='0.3rem'; row.innerHTML='<input class="var-name" placeholder="Size" style="flex:1"><input class="var-price" type="number" step="0.01" placeholder="Price" style="flex:1"><button class="remove-var btn-sm">✕</button>';
            document.getElementById('variantsContainer').appendChild(row);
            row.querySelector('.remove-var').addEventListener('click', ()=>row.remove());
        });

        document.getElementById('aiDescBtn').addEventListener('click', ()=> document.getElementById('itemDesc').value = ['Rich and creamy.','A delightful blend.','Freshly prepared.','Our signature recipe.'][Math.floor(Math.random()*4)]);

        async function saveItem(andClear = false) {
            if (!cafeData.id) return toast('Cafe not ready', true);
            const editId = document.getElementById('editItemId').value;
            const name = document.getElementById('itemName').value.trim();
            if (!name) return toast('Name required', true);
            const select = document.getElementById('itemCategorySelect');
            let category = select.value;
            if (category === '__new__') category = document.getElementById('itemCategoryInput').value.trim() || 'Uncategorized';
            const price = parseFloat(document.getElementById('itemPrice').value)||0;
            const discount = document.getElementById('itemDiscount').value.trim();
            const featured = document.getElementById('itemFeatured').checked;
            const varRows = document.querySelectorAll('#variantsContainer > div');
            let desc = document.getElementById('itemDesc').value.trim();
            let hasVariants = false, varParts = [];
            varRows.forEach(r => {
                const vn = r.querySelector('.var-name')?.value.trim();
                const vp = r.querySelector('.var-price')?.value;
                if (vn && vp) { hasVariants = true; varParts.push(vn+'='+vp); }
            });
            if (hasVariants) desc = 'VAR::' + varParts.join('|');
            const payload = { name, description: desc, price, category, discount, featured, cafe_id: cafeData.id };
            const { error } = editId ? await _supabase.from('menu_items').update(payload).eq('id', editId) : await _supabase.from('menu_items').insert(payload);
            if (error) { toast('Save failed', true); return; }
            toast(editId ? 'Item updated!' : 'Item added!');
            loadItems(); loadStats();
            if (andClear) { resetItemForm(); document.getElementById('itemName').focus(); }
            else resetItemForm();
        }

        document.getElementById('submitItemBtn').addEventListener('click', (e) => { e.preventDefault(); saveItem(false); });
        document.getElementById('saveAndNextBtn').addEventListener('click', (e) => { e.preventDefault(); saveItem(true); });

        function resetItemForm() {
            document.getElementById('editItemId').value = '';
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '0';
            document.getElementById('itemCategorySelect').value = 'Uncategorized';
            document.getElementById('itemCategoryInput').style.display = 'none';
            document.getElementById('itemCategoryInput').value = '';
            document.getElementById('itemDiscount').value = '';
            document.getElementById('itemFeatured').checked = false;
            document.getElementById('itemDesc').value = '';
            document.getElementById('variantsContainer').innerHTML = `<div class="flex-row" style="margin-bottom:0.3rem;"><input class="var-name" placeholder="Size" style="flex:1"><input class="var-price" type="number" step="0.01" placeholder="Price" style="flex:1"><button class="remove-var btn-sm">✕</button></div>`;
            document.getElementById('submitItemBtn').textContent = 'Save Item';
            document.getElementById('saveAndNextBtn').style.display = 'inline-flex';
            document.getElementById('addItemCard').classList.remove('collapsed');
        }

        document.querySelectorAll('.order-tabs button').forEach(b => b.addEventListener('click', function(){
            document.querySelectorAll('.order-tabs button').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
            activeOrderTab = this.dataset.tab;
            updatePrintButton();
            renderOrders();
        }));
        updatePrintButton();

        init();
    </script>
</body>
</html>
