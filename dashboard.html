<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Cafe Boss</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js" defer></script>
    
    <style>
        :root { --primary: #FF6B35; --accent: #2F3E46; --bg: #1a1c1d; --text: #f0f0f0; --card-bg: #2a2a2c; --border: #3a3a3c; --success: #27ae60; --warning: #f39c12; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        h1, h2, h3 { margin: 0; }
        .controls button, .controls select { margin-left: 10px; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
        .stats { display: flex; justify-content: space-between; text-align: center; }
        .stat-box { flex: 1; }
        .stat-box span { display: block; font-size: 2rem; color: var(--primary); font-weight: bold; }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; }
        .btn { background: var(--primary); color: #fff; padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn-success { background: var(--success); }
        .btn-warning { background: var(--warning); }
        .order-card { background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-top: 10px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { padding: 8px 15px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; }
        .tab.active { background: var(--primary); border-color: var(--primary); }
        collapsible { cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; width: 100%; }
        .hidden { display: none; }
        #qr-container { display: flex; flex-direction: column; align-items: center; margin-top: 15px; }
        .item-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: center; }
        #debug-panel { position: fixed; bottom: 0; left: 0; right: 0; background: red; color: white; padding: 10px; font-weight: bold; z-index: 9999; display: none; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="debug-panel"></div>

    <header>
        <h1 data-i18n="title">☕ Cafe Boss</h1>
        <div class="controls">
            <select id="lang-select">
                <option value="en">English</option>
                <option value="hi">हिन्दी</option>
            </select>
            <button id="unmute-btn">🔊 Unmute</button>
            <button id="logout-btn">Logout</button>
        </div>
    </header>

    <div class="grid">
        <div class="card">
            <h3 data-i18n="stats">Overview Stats</h3>
            <div class="stats" style="margin-top: 15px;">
                <div class="stat-box"><span id="stat-views">0</span><small>Views</small></div>
                <div class="stat-box"><span id="stat-items">0</span><small>Items</small></div>
                <div class="stat-box"><span id="stat-orders">0</span><small>Orders</small></div>
            </div>
        </div>
        <div class="card">
            <h3>Analytics (Last 7 Days)</h3>
            <canvas id="analyticsChart" height="100"></canvas>
        </div>
    </div>

    <div class="card" style="margin-bottom: 20px;">
        <h2 data-i18n="orders">Orders</h2>
        <div class="tabs">
            <div class="tab active" onclick="filterOrders(this, 'new')">New</div>
            <div class="tab" onclick="filterOrders(this, 'accepted')">Accepted</div>
            <div class="tab" onclick="filterOrders(this, 'completed')">Completed</div>
        </div>
        <div id="orders-list"></div>
    </div>

    <div class="grid">
        <div class="card">
            <collapsible onclick="toggleCard('settings-content')">Settings ▼</collapsible>
            <div id="settings-content" class="hidden">
                <input type="text" id="cafe-name" placeholder="Cafe Name">
                <input type="text" id="whatsapp" placeholder="WhatsApp Number">
                <textarea id="cafe-desc" placeholder="Description"></textarea>
                <label>Primary Color: <input type="color" id="primary-color"></label>
                <label>Accent Color: <input type="color" id="accent-color"></label>
                <button class="btn" id="save-settings">Save Settings</button>
            </div>
        </div>

        <div class="card">
            <collapsible onclick="toggleCard('qr-content')">QR Code Generator ▼</collapsible>
            <div id="qr-content" class="hidden">
                <button class="btn" id="generate-qr">Generate QR</button>
                <div id="qr-container"></div>
                <input type="text" id="qr-url" readonly style="text-align: center; margin-top:10px;">
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <collapsible onclick="toggleCard('smart-menu-content')">Smart Menu Builder ▼</collapsible>
            <div id="smart-menu-content" class="hidden">
                <label class="btn" style="display:block; text-align:center; margin-bottom:10px;">
                    Capture Menu (Camera)
                    <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">
                </label>
                <label class="btn" style="display:block; text-align:center; background:var(--accent);">
                    Upload Gallery
                    <input type="file" id="gallery-input" accept="image/*" style="display:none;">
                </label>
                <div id="ocr-preview" style="margin-top: 10px; max-height:150px; overflow-y:auto; font-size:0.9em; white-space:pre-wrap;"></div>
                <button class="btn" id="scan-btn" style="margin-top:10px; display:none;">Scan & Extract</button>
            </div>
        </div>

        <div class="card">
            <collapsible onclick="toggleCard('add-item-content')">Add Item ▼</collapsible>
            <div id="add-item-content" class="hidden">
                <input type="text" id="item-name" placeholder="Name *" required>
                <div style="display:flex; gap:10px;">
                    <textarea id="item-desc" placeholder="Description"></textarea>
                    <button id="ai-desc-btn" style="width:50px; height:auto;">✨</button>
                </div>
                <input type="number" id="item-price" placeholder="Price (₹) *" required>
                <input type="text" id="item-category" list="categories" placeholder="Category *" required>
                <datalist id="categories"></datalist>
                <input type="text" id="item-discount" placeholder="Discount (e.g. 20% OFF)">
                <input type="text" id="item-variants" placeholder="Variants (e.g. Small=150|Large=250)">
                <label><input type="checkbox" id="item-featured"> 🔥 Chef's Special</label>
                <button class="btn" id="save-item" style="margin-top:10px;">Add / Update Item</button>
            </div>
        </div>
    </div>

    <div class="card">
        <collapsible onclick="toggleCard('items-list-content')">Menu Items ▼</collapsible>
        <div id="items-list-content" class="hidden">
            <div id="items-container"></div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './config.js';

        // Global Error Catcher
        window.onerror = function(msg, url, line) {
            const panel = document.getElementById('debug-panel');
            panel.style.display = 'block';
            panel.innerHTML += `🚨 ERROR: ${msg} <br><small>Line: ${line}</small><br><hr>`;
        };

        let cafe = null;
        let currentOrderFilter = 'new';
        let audioCtx;
        
        const t = {
            en: { title: "☕ Cafe Boss", stats: "Overview Stats", orders: "Orders" },
            hi: { title: "☕ कैफे बॉस", stats: "अवलोकन आंकड़े", orders: "आदेश" }
        };

        const beep = () => {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.15);
            osc.stop(audioCtx.currentTime + 0.15);
        };

        document.getElementById('unmute-btn').addEventListener('click', (e) => {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            e.target.style.display = 'none';
        });

        document.getElementById('lang-select').addEventListener('change', (e) => {
            const lang = e.target.value;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(t[lang][key]) el.innerText = t[lang][key];
            });
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = 'auth.html';
        });

        window.toggleCard = (id) => document.getElementById(id).classList.toggle('hidden');

        async function init() {
            try {
                const { data: { user }, error: authError } = await supabase.auth.getUser();
                
                if (authError) throw new Error("Auth check failed: " + authError.message);

                if (!user) {
                    document.body.innerHTML = '<div style="padding: 40px; text-align: center;"><h2 style="color:var(--primary);">You are not logged in!</h2><a href="auth.html" class="btn" style="display:inline-block; margin-top:20px;">Go to Login Page</a></div>';
                    return;
                }

                let { data: cafeData, error: fetchError } = await supabase.from('cafes').select('*').eq('owner_id', user.id).maybeSingle();
                if (fetchError) throw new Error("Database Fetch Error: " + fetchError.message);
                
                if (!cafeData) {
                    const { data: newCafe, error: insertError } = await supabase.from('cafes').insert([{ owner_id: user.id }]).select().maybeSingle();
                    if (insertError) throw new Error("Database Insert Error: " + insertError.message);
                    cafe = newCafe;
                } else { 
                    cafe = cafeData; 
                }

                populateSettings();
                await loadStats();
                await loadOrders();
                await loadItems();
                setupRealtime();
                
            } catch (err) {
                console.error("Initialization breakdown:", err);
                const panel = document.getElementById('debug-panel');
                panel.style.display = 'block';
                panel.innerHTML += `💥 CRASH: ${err.message}<br><hr>`;
            }
        }

        function populateSettings() {
            if (!cafe) return;
            document.getElementById('cafe-name').value = cafe.cafe_name || '';
            document.getElementById('whatsapp').value = cafe.whatsapp || '';
            document.getElementById('cafe-desc').value = cafe.description || '';
            document.getElementById('primary-color').value = cafe.primary_color || '#FF6B35';
            document.getElementById('accent-color').value = cafe.accent_color || '#2F3E46';
        }

        document.getElementById('save-settings').addEventListener('click', async () => {
            const updates = {
                cafe_name: document.getElementById('cafe-name').value,
                whatsapp: document.getElementById('whatsapp').value,
                description: document.getElementById('cafe-desc').value,
                primary_color: document.getElementById('primary-color').value,
                accent_color: document.getElementById('accent-color').value
            };
            await supabase.from('cafes').update(updates).eq('id', cafe.id);
            alert('Settings Saved');
        });

        document.getElementById('generate-qr').addEventListener('click', () => {
            const container = document.getElementById('qr-container');
            container.innerHTML = '';
            const url = `https://zakiewillplay.github.io/CafeBoss/menu.html?id=${cafe.id}`;
            new QRCode(container, { text: url, width: 250, height: 250 });
            const urlInput = document.getElementById('qr-url');
            urlInput.value = url;
            urlInput.onclick = () => { urlInput.select(); document.execCommand('copy'); alert('Copied Link!'); };
        });

        async function loadStats() {
            document.getElementById('stat-views').innerText = cafe.menu_views || 0;
            
            const { count: itemCount } = await supabase.from('menu_items').select('*', { count: 'exact', head: true }).eq('cafe_id', cafe.id);
            document.getElementById('stat-items').innerText = itemCount || 0;
            
            const { count: orderCount } = await supabase.from('orders').select('*', { count: 'exact', head: true }).eq('cafe_id', cafe.id);
            document.getElementById('stat-orders').innerText = orderCount || 0;

            if (window.Chart) {
                const ctx = document.getElementById('analyticsChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: { labels: ['D-6','D-5','D-4','D-3','D-2','D-1','Today'], datasets: [{ label: 'Orders', data: [0,0,0,0,0,0,orderCount||0], borderColor: '#FF6B35', tension: 0.3 }] },
                    options: { responsive: true, scales: { y: { beginAtZero: true } } }
                });
            }
        }

        window.filterOrders = (element, status) => {
            currentOrderFilter = status;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            loadOrders();
        };

        async function loadOrders() {
            const { data } = await supabase.from('orders').select('*').eq('cafe_id', cafe.id).order('created_at', { ascending: false });
            const list = document.getElementById('orders-list');
            list.innerHTML = '';
            
            const orderData = data || [];
            const filtered = orderData.filter(o => {
                if(currentOrderFilter === 'new') return o.status === 'new';
                if(currentOrderFilter === 'accepted') return o.status === 'accepted' || o.status === 'delivered';
                return o.status === 'completed';
            });

            filtered.forEach(o => {
                const card = document.createElement('div');
                card.className = 'order-card';
                let itemsHtml = (o.items || []).map(i => `${i.qty}x ${i.name} (₹${i.price})`).join('<br>');
                let actionBtn = '';
                
                if(o.status === 'new') actionBtn = `<button class="btn btn-success" onclick="updateOrderStatus('${o.id}', 'accepted')">Accept</button>`;
                else if(o.status === 'accepted') actionBtn = `<button class="btn btn-warning" onclick="updateOrderStatus('${o.id}', 'delivered')">Deliver</button><button class="btn btn-success" style="margin-top:5px;" onclick="updateOrderStatus('${o.id}', 'completed')">Complete</button>`;
                else if(o.status === 'completed') actionBtn = `<button class="btn" onclick="generatePDF('${o.id}')">PDF Bill</button>`;

                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <strong>Table: ${o.table_number || 'N/A'}</strong>
                        <span>${new Date(o.created_at).toLocaleTimeString()}</span>
                    </div>
                    <div>${itemsHtml}</div>
                    <div style="margin-top:10px; font-weight:bold; font-size:1.2em;">Total: ₹${o.total}</div>
                    <div style="margin-top:10px;">${actionBtn}</div>
                `;
                list.appendChild(card);
            });
        }

        window.updateOrderStatus = async (id, status) => {
            await supabase.from('orders').update({ status }).eq('id', id);
            loadOrders();
        };

        window.generatePDF = (id) => {
            if (window.jspdf) {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.text(`Bill for Order ID: ${id}`, 10, 10);
                doc.save(`Bill_${id}.pdf`);
            } else {
                alert("PDF engine is still loading. Try again in a moment.");
            }
        };

        function setupRealtime() {
            if (!cafe || cafe.id === 'temp') return;
            supabase.channel('custom-all-channel')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'orders', filter: `cafe_id=eq.${cafe.id}` }, payload => {
                    beep();
                    if(Notification.permission === 'granted') new Notification('New Order Received!');
                    else Notification.requestPermission();
                    if(currentOrderFilter === 'new') loadOrders();
                }).subscribe();
        }

        document.getElementById('ai-desc-btn').addEventListener('click', (e) => {
            e.preventDefault();
            const phrases = ["Mouth-watering perfection", "Freshly prepared with love", "A delightful chef's special", "Crispy, savory, and irresistible"];
            document.getElementById('item-desc').value = phrases[Math.floor(Math.random() * phrases.length)];
        });

        document.getElementById('save-item').addEventListener('click', async () => {
            const isVariants = document.getElementById('item-variants').value;
            const payload = {
                cafe_id: cafe.id,
                name: document.getElementById('item-name').value,
                description: document.getElementById('item-desc').value + (isVariants ? ` VAR::${isVariants}` : ''),
                price: isVariants ? 0 : (document.getElementById('item-price').value || 0),
                category: document.getElementById('item-category').value || 'Uncategorized',
                discount: document.getElementById('item-discount').value,
                featured: document.getElementById('item-featured').checked
            };
            await supabase.from('menu_items').insert([payload]);
            loadItems();
            document.getElementById('item-name').value = '';
        });

        async function loadItems() {
            const { data } = await supabase.from('menu_items').select('*').eq('cafe_id', cafe.id);
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            const datalist = document.getElementById('categories');
            let cats = new Set();

            const itemData = data || [];
            itemData.forEach(item => {
                if (item.category) cats.add(item.category);
                const div = document.createElement('div');
                div.className = 'item-row';
                div.innerHTML = `
                    <div>
                        <strong>${item.name}</strong> ${item.featured ? '🔥' : ''} ${item.discount ? `<span style="color:red;font-size:0.8em;">[${item.discount}]</span>` : ''}<br>
                        <small>${item.category} | ₹${item.price}</small>
                    </div>
                    <div>
                        <button onclick="deleteItem('${item.id}')" style="background:red; border:none; padding:5px; border-radius:4px; color:white; cursor:pointer;">Del</button>
                    </div>
                `;
                container.appendChild(div);
            });
            datalist.innerHTML = Array.from(cats).map(c => `<option value="${c}">`).join('');
        }

        window.deleteItem = async (id) => {
            await supabase.from('menu_items').delete().eq('id', id);
            loadItems();
        }

        const handleImage = (e) => {
            const file = e.target.files;
            if(!file) return;
            document.getElementById('ocr-preview').innerText = "Image selected. Ready to scan.";
            document.getElementById('scan-btn').style.display = 'block';
            document.getElementById('scan-btn').onclick = () => scanImage(file);
        };
        document.getElementById('camera-input').addEventListener('change', handleImage);
        document.getElementById('gallery-input').addEventListener('change', handleImage);

        async function scanImage(file) {
            document.getElementById('ocr-preview').innerText = "Scanning... Please wait.";
            if (window.Tesseract) {
                const worker = await Tesseract.createWorker('eng');
                const ret = await worker.recognize(file);
                await worker.terminate();
                
                const lines = ret.data.text.split('\n').filter(l => l.match(/\d/));
                document.getElementById('ocr-preview').innerText = lines.join('\n');
            } else {
                document.getElementById('ocr-preview').innerText = "Scanner engine is still loading. Try again in a moment.";
            }
        }

        init();
    </script>
</body>
</html>
