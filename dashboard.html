<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Boss – Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --primary: #FF6B35; --bg: #0f0f13; --card: rgba(25,25,30,0.85);
            --border: rgba(255,255,255,0.08); --text: #f0f0f0; --muted: #a0a0b0;
        }
        body.light-mode {
            --bg: #f2f1ed; --card: rgba(255,255,255,0.9); --border: rgba(0,0,0,0.12); --text: #1a1a1a; --muted: #555;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); transition:0.4s; }
        .toast-container { position:fixed; top:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:10px; }
        .toast { background:#27ae60; color:#fff; padding:0.9rem 1.5rem; border-radius:12px; transform:translateX(120%); transition:0.3s; }
        .toast.show { transform:translateX(0); } .toast.error { background:#c0392b; }
        header { background:var(--card); border-bottom:1px solid var(--border); padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; }
        .logo { font-weight:700; font-size:1.3rem; color:var(--primary); }
        button, select, input, textarea { padding:0.5rem 1rem; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text); cursor:pointer; font-size:0.85rem; font-family:inherit; transition:0.2s; }
        button:hover { border-color:var(--primary); }
        .container { max-width:1200px; margin:2rem auto; padding:0 1.5rem; display:grid; gap:1.8rem; }
        .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:1rem; }
        .stat-card { background:var(--card); border-radius:16px; padding:1.5rem; text-align:center; }
        .stat-num { font-size:2.2rem; font-weight:700; color:var(--primary); }
        .card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:1.5rem; }
        .card h3 { cursor:pointer; display:flex; align-items:center; gap:0.5rem; }
        .collapsed .card-content { display:none; }
        .order-tabs { display:flex; margin-bottom:1rem; border-radius:8px; overflow:hidden; border:1px solid var(--border); }
        .order-tabs button { flex:1; padding:0.7rem; border:none; background:transparent; color:var(--muted); font-weight:600; }
        .order-tabs button.active { background:var(--primary); color:#fff; }
        .order-card { background:rgba(0,0,0,0.2); border-radius:12px; padding:1rem; margin-bottom:0.8rem; }
        .item-row { display:flex; align-items:center; gap:1rem; background:rgba(0,0,0,0.2); padding:0.8rem; border-radius:8px; margin-bottom:0.5rem; flex-wrap:wrap; }
        .badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:0.7rem; }
        .badge-discount { background:#c0392b; color:#fff; } .badge-featured { background:#f39c12; color:#000; }
        .toggle-switch { position:relative; width:44px; height:24px; }
        .toggle-switch input { opacity:0; width:0; height:0; }
        .toggle-slider { position:absolute; top:0;left:0;right:0;bottom:0; background:#555; border-radius:24px; transition:0.3s; }
        .toggle-slider:before { content:""; height:18px; width:18px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:0.3s; }
        input:checked+.toggle-slider { background:#27ae60; }
        input:checked+.toggle-slider:before { transform:translateX(20px); }
        .qr-display img { border-radius:12px; background:#fff; padding:0.5rem; }
        .btn-sm { padding:0.4rem 1rem; font-size:0.8rem; }
        .flex-row { display:flex; gap:0.5rem; align-items:center; }
        .header-actions { display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; }
    </style>
</head>
<body class="light-mode">
    <div class="toast-container" id="toastContainer"></div>
    <header>
        <div class="logo">☕ Cafe Boss</div>
        <div class="header-actions">
            <select id="langSelect"><option value="en">English</option><option value="hi">हिन्दी</option></select>
            <button id="themeToggle">🌙 Dark</button>
            <button id="unmuteBtn">🔊 Unmute</button>
            <button id="notifBtn" style="display:none;">🔔 Enable Alerts</button>
            <button id="livePreviewBtn">👁️ Live Menu</button>
            <button id="logoutBtn" style="color:#f87171;">Logout</button>
        </div>
    </header>
    <div class="container">
        <div class="stats-row">
            <div class="stat-card"><div class="stat-num" id="statViews">0</div><div>Views</div></div>
            <div class="stat-card"><div class="stat-num" id="statItems">0</div><div>Items</div></div>
            <div class="stat-card"><div class="stat-num" id="statOrders">0</div><div>Orders</div></div>
        </div>
        <div class="card" id="analyticsCard"><h3>📊 Analytics <span>▼</span></h3><div class="card-content"><canvas id="ordersChart" height="200"></canvas></div></div>
        <div class="card" id="ordersCard"><h3>📋 Orders</h3><div class="card-content"><div class="order-tabs"><button class="active" data-tab="new">New</button><button data-tab="accepted">Accepted</button><button data-tab="completed">Completed</button></div><div id="ordersList"></div></div></div>
        <div class="card collapsed" id="settingsCard"><h3>⚙️ Settings</h3><div class="card-content"><input id="setCafeName" placeholder="Cafe name"><input id="setWhatsapp" placeholder="WhatsApp"><textarea id="setDesc"></textarea><input type="color" id="setPrimary" value="#FF6B35"><input type="color" id="setAccent" value="#2F3E46"><button id="saveSettingsBtn">Save</button></div></div>
        <div class="card collapsed" id="qrCard"><h3>📱 QR Code</h3><div class="card-content"><button id="generateQrBtn">Generate QR</button><div id="qrDisplay" class="qr-display"></div><p id="qrUrl"></p><button id="copyQrLink" style="display:none;">📋 Copy Link</button></div></div>
        <!-- RAPID ADD ITEM CARD -->
        <div class="card" id="addItemCard">
            <h3>➕ Add Item <span class="collapse-icon">▼</span></h3>
            <div class="card-content">
                <input type="hidden" id="editItemId">
                <div class="flex-row" style="margin-bottom:0.5rem;">
                    <input id="itemName" placeholder="Item name *" style="flex:2;">
                    <input type="number" id="itemPrice" step="0.01" placeholder="Price ₹" style="width:120px;">
                </div>
                <div class="flex-row" style="margin-bottom:0.5rem;">
                    <input id="itemCategory" list="categoryList" placeholder="Category" style="flex:1;">
                    <datalist id="categoryList"></datalist>
                    <input id="itemDiscount" placeholder="Discount (e.g. 10% off)" style="flex:1;">
                </div>
                <textarea id="itemDesc" placeholder="Description (optional)" rows="2" style="margin-bottom:0.5rem;"></textarea>
                <div class="flex-row" style="margin-bottom:0.5rem;">
                    <button id="aiDescBtn" class="btn-sm">✨ AI Desc</button>
                    <label style="display:flex; align-items:center; gap:0.3rem; cursor:pointer;">
                        <input type="checkbox" id="itemFeatured"> 🔥 Chef's Special
                    </label>
                </div>
                <div id="variantsContainer" style="margin-bottom:0.5rem;">
                    <div class="flex-row" style="margin-bottom:0.3rem;">
                        <input class="var-name" placeholder="Size" style="flex:1;">
                        <input class="var-price" type="number" step="0.01" placeholder="Price" style="flex:1;">
                        <button class="remove-var btn-sm">✕</button>
                    </div>
                </div>
                <button id="addVariantBtn" class="btn-sm">+ Add Variant</button>
                <div class="flex-row" style="margin-top:0.8rem; gap:0.5rem;">
                    <button id="submitItemBtn" style="flex:1;">Save Item</button>
                    <button id="saveAndNextBtn" style="flex:1; background:var(--primary);">Save & Add Next</button>
                </div>
            </div>
        </div>
        <!-- MENU ITEMS LIST -->
        <div class="card" id="menuItemsCard">
            <h3>📋 Menu Items <span class="collapse-icon">▼</span></h3>
            <div class="card-content" id="menuItemsList"></div>
        </div>
    </div>
    <script>
        const SUPABASE_URL = 'https://pbbybxdxnvzhjtkpfpej.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiYnlieGR4bnZ6aGp0a3BmcGVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQ0ODksImV4cCI6MjA5NDk0MDQ4OX0.u3VWUTu633pKfZ5Y8jpe2FUX4Gf9NGAKCsBGXqGTtao';
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const BASE_URL = 'https://zakiewillplay.github.io/CafeBoss/menu.html?id=';
        const jsPDF = window.jspdf?.jsPDF || window.jspdf;

        // Toast
        function toast(msg, err=false) {
            const el = document.createElement('div');
            el.className = 'toast ' + (err ? 'error' : '') + ' show';
            el.textContent = msg;
            document.getElementById('toastContainer').appendChild(el);
            setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 3000);
        }

        // Theme
        function applyTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.body.classList.remove('light-mode');
                document.getElementById('themeToggle').textContent = '☀️ Light';
            } else {
                document.body.classList.add('light-mode');
                document.getElementById('themeToggle').textContent = '🌙 Dark';
            }
        }
        document.getElementById('themeToggle').addEventListener('click', () => { document.body.classList.toggle('light-mode'); localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark'); applyTheme(); });
        applyTheme();

        // Audio + Notifications
        let audioCtx, audioReady = false;
        const unmuteBtn = document.getElementById('unmuteBtn');
        const notifBtn = document.getElementById('notifBtn');

        unmuteBtn.addEventListener('click', () => {
            try {
                audioCtx = new (window.AudioContext||window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                audioReady = true;
                unmuteBtn.style.display = 'none';
            } catch(e) { toast('Audio not supported', true); }
        });

        function beep() { if (!audioReady) return; const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.value=800; g.gain.value=0.3; o.start(); o.stop(audioCtx.currentTime+0.15); }

        // Notification setup
        if ('Notification' in window) {
            if (Notification.permission === 'granted') {
                notifBtn.style.display = 'none';
            } else if (Notification.permission === 'default') {
                notifBtn.style.display = 'inline-flex';
            } else {
                // denied
                notifBtn.style.display = 'none';
            }
            notifBtn.addEventListener('click', () => {
                Notification.requestPermission().then(perm => {
                    if (perm === 'granted') {
                        notifBtn.style.display = 'none';
                        toast('Alerts enabled!');
                    } else {
                        notifBtn.style.display = 'none';
                        toast('Notifications disabled. You will still hear sound alerts.', true);
                    }
                });
            });
        }

        // Logout, live preview
        document.getElementById('logoutBtn').addEventListener('click', () => _supabase.auth.signOut().then(() => window.location.href='index.html'));
        document.getElementById('livePreviewBtn').addEventListener('click', () => { if (cafeData?.id) window.open(BASE_URL + cafeData.id, '_blank'); else toast('Cafe not ready', true); });
        document.querySelectorAll('.card h3').forEach(h => h.addEventListener('click', () => h.parentElement.classList.toggle('collapsed')));

        let cafeData = null, allOrders = [], allItems = [], activeOrderTab = 'new', chartInstance = null;

        async function getOrCreateCafe(uid) {
            const { data } = await _supabase.from('cafes').select('*').eq('owner_id', uid).maybeSingle();
            if (data) return data;
            const { data: ins } = await _supabase.from('cafes').insert({ owner_id: uid, cafe_name: 'My Cafe' }).select().maybeSingle();
            return ins || { id: null, cafe_name:'My Cafe', _temp:true };
        }

        async function init() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href='auth.html'; return; }
            cafeData = await getOrCreateCafe(user.id);
            if (cafeData._temp) toast('Cafe profile not ready. Re‑login.', true);
            document.getElementById('setCafeName').value = cafeData.cafe_name||'';
            document.getElementById('setWhatsapp').value = cafeData.whatsapp||'';
            document.getElementById('setDesc').value = cafeData.description||'';
            document.getElementById('setPrimary').value = cafeData.primary_color||'#FF6B35';
            document.getElementById('setAccent').value = cafeData.accent_color||'#2F3E46';
            loadStats(); loadOrders(); loadItems(); loadAnalytics();
            if (cafeData.id && !cafeData._temp) setupRealtime();
        }

        // Save settings
        document.getElementById('saveSettingsBtn').addEventListener('click', async () => {
            if (!cafeData.id) return toast('Cafe not ready', true);
            const u = { cafe_name: document.getElementById('setCafeName').value.trim(), whatsapp: document.getElementById('setWhatsapp').value.trim(), description: document.getElementById('setDesc').value.trim(), primary_color: document.getElementById('setPrimary').value, accent_color: document.getElementById('setAccent').value };
            const { error } = await _supabase.from('cafes').update(u).eq('id', cafeData.id);
            if (error) toast('Save failed', true);
            else { Object.assign(cafeData, u); toast('Settings saved'); }
        });

        // QR
        document.getElementById('generateQrBtn').addEventListener('click', () => {
            if (!cafeData.id) return toast('Cafe not ready', true);
            const url = BASE_URL + cafeData.id;
            document.getElementById('qrDisplay').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(url)}" width="250" height="250">`;
            document.getElementById('qrUrl').textContent = url;
            document.getElementById('copyQrLink').style.display = 'inline-block';
        });
        document.getElementById('copyQrLink').addEventListener('click', () => { navigator.clipboard.writeText(document.getElementById('qrUrl').textContent); toast('Link copied!'); });

        // ========== DATA ==========
        async function loadStats() {
            if (!cafeData.id || cafeData._temp) return;
            const [{ count: items }, { count: orders }, { count: views }] = await Promise.all([
                _supabase.from('menu_items').select('*', { count:'exact', head:true }).eq('cafe_id', cafeData.id),
                _supabase.from('orders').select('*', { count:'exact', head:true }).eq('cafe_id', cafeData.id),
                _supabase.from('menu_views_log').select('*', { count:'exact', head:true }).eq('cafe_id', cafeData.id)
            ]);
            document.getElementById('statViews').textContent = views||0;
            document.getElementById('statItems').textContent = items||0;
            document.getElementById('statOrders').textContent = orders||0;
        }

        async function loadOrders() {
            if (!cafeData.id) return;
            const { data } = await _supabase.from('orders').select('*').eq('cafe_id', cafeData.id).order('created_at', { ascending: false });
            allOrders = data||[]; renderOrders();
        }

        function renderOrders() {
            const filtered = allOrders.filter(o => (activeOrderTab==='new'&&o.status==='new')||(activeOrderTab==='accepted'&&o.status==='accepted')||(activeOrderTab==='completed'&&(o.status==='delivered'||o.status==='completed')));
            const list = document.getElementById('ordersList');
            if (!filtered.length) { list.innerHTML = '<p style="color:var(--muted); text-align:center;">No orders yet.</p>'; return; }
            list.innerHTML = filtered.map(o => {
                const items = typeof o.items === 'string' ? JSON.parse(o.items) : o.items;
                const itemStr = Array.isArray(items) ? items.map(i => i.name+' x'+(i.qty||1)).join(', ') : '';
                const time = new Date(o.created_at).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
                let actions = '';
                if (o.status==='new') actions = `<button data-action="accept" data-id="${o.id}">Accept</button>`;
                if (o.status==='accepted') actions = `<button data-action="deliver" data-id="${o.id}">Deliver</button>`;
                if (o.status==='delivered'||o.status==='completed') actions = `<button data-action="pdf" data-id="${o.id}">PDF</button><button data-action="print" data-id="${o.id}">Print</button>`;
                return `<div class="order-card"><div class="order-meta"><span>Table: ${o.table_number||'N/A'}</span><span>${time}</span><span>${o.customer_name||'Guest'}</span></div><div>${itemStr}</div><div style="font-weight:700;">Total: ₹${parseFloat(o.total).toFixed(2)}</div><div>${actions}</div></div>`;
            }).join('');
            document.querySelectorAll('[data-action="accept"]').forEach(b => b.addEventListener('click', async ()=>{ await _supabase.from('orders').update({status:'accepted'}).eq('id',b.dataset.id); loadOrders(); }));
            document.querySelectorAll('[data-action="deliver"]').forEach(b => b.addEventListener('click', async ()=>{ await _supabase.from('orders').update({status:'delivered'}).eq('id',b.dataset.id); loadOrders(); }));
            document.querySelectorAll('[data-action="pdf"]').forEach(b => b.addEventListener('click', () => { const o = allOrders.find(o=>o.id===b.dataset.id); if(o) downloadPDF(o); }));
            document.querySelectorAll('[data-action="print"]').forEach(b => b.addEventListener('click', () => { const o = allOrders.find(o=>o.id===b.dataset.id); if(o) printOrder(o); }));
        }

        function downloadPDF(order) {
            if (!jsPDF) return toast('PDF library not loaded', true);
            const doc = new jsPDF();
            const items = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
            doc.setFontSize(16); doc.text('Cafe Boss - Bill', 20, 20);
            doc.setFontSize(11); doc.text(`Table: ${order.table_number||'N/A'}  Customer: ${order.customer_name||'Guest'}`, 20, 30);
            let y=50;
            if (Array.isArray(items)) items.forEach(i => { doc.text(`${i.name} x${i.qty||1} - ₹${(i.price*(i.qty||1)).toFixed(2)}`, 20, y); y+=8; });
            doc.line(20, y, 190, y); y+=8;
            doc.setFontSize(13); doc.text(`Total: ₹${parseFloat(order.total).toFixed(2)}`, 20, y);
            doc.save(`bill_${order.id.slice(0,8)}.pdf`);
        }

        function printOrder(order) {
            const items = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
            let html = `<html><body style="font-family:sans-serif;padding:20px;"><h2>Cafe Boss - Bill</h2><p>Table: ${order.table_number||'N/A'} | Customer: ${order.customer_name||'Guest'}</p><p>Date: ${new Date(order.created_at).toLocaleString()}</p><hr>`;
            if (Array.isArray(items)) items.forEach(i => { html += `<p>${i.name} x${i.qty||1} - ₹${(i.price*(i.qty||1)).toFixed(2)}</p>`; });
            html += `<hr><h3>Total: ₹${parseFloat(order.total).toFixed(2)}</h3></body></html>`;
            const w = window.open('', '_blank'); w.document.write(html); w.document.close(); w.focus(); w.print();
        }

        function setupRealtime() {
            _supabase.channel('orders-realtime').on('postgres_changes', { event:'INSERT', schema:'public', table:'orders', filter:`cafe_id=eq.${cafeData.id}` }, payload => {
                allOrders.unshift(payload.new);
                renderOrders();
                beep();
                loadStats();
                if (Notification.permission === 'granted') new Notification('New Order!', { body:'A new order has been placed.', icon:'☕' });
                else toast('New order received!', false);
            }).subscribe();
        }

        async function loadAnalytics() {
            if (!cafeData.id) return;
            const sevenDaysAgo = new Date(Date.now()-7*86400000).toISOString();
            const { data } = await _supabase.from('orders').select('created_at').eq('cafe_id', cafeData.id).gte('created_at', sevenDaysAgo).order('created_at');
            const days = {}; for (let i=6; i>=0; i--) { const d = new Date(Date.now()-i*86400000); days[d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})] = 0; }
            (data||[]).forEach(o => { const k = new Date(o.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short'}); if (days[k]!==undefined) days[k]++; });
            const ctx = document.getElementById('ordersChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, { type:'line', data:{ labels:Object.keys(days), datasets:[{ label:'Orders', data:Object.values(days), borderColor:'#FF6B35', backgroundColor:'rgba(255,107,53,0.1)', fill:true, tension:0.3 }] } });
        }

        // ========== ITEMS ==========
        async function loadItems() {
            if (!cafeData.id) { allItems=[]; renderItems(); return; }
            const { data } = await _supabase.from('menu_items').select('*').eq('cafe_id', cafeData.id).order('category');
            allItems = data||[]; renderItems(); updateCategoryDatalist();
        }

        function renderItems() {
            const list = document.getElementById('menuItemsList');
            if (!allItems.length) { list.innerHTML = '<p style="color:var(--muted);">No items yet. Add your first one above!</p>'; return; }
            list.innerHTML = allItems.map(item => {
                let badges = '';
                if (item.discount) badges += `<span class="badge badge-discount">${item.discount}</span> `;
                if (item.featured) badges += `<span class="badge badge-featured">🔥</span>`;
                const hasVariants = item.description?.startsWith('VAR::');
                let variantInfo = '';
                if (hasVariants) variantInfo = item.description.replace('VAR::','').split('|').map(v => { const [n,p]=v.split('='); return `<span style="font-size:0.7rem;">${n}:₹${p}</span>`; }).join(' ');
                return `<div class="item-row">
                    <div style="flex:1;"><strong>${item.name}</strong> ${badges}<div style="font-size:0.8rem;">${hasVariants?variantInfo:(item.description||'')}</div><div>${item.category} | ₹${item.price}</div></div>
                    <label class="toggle-switch"><input type="checkbox" ${item.available?'checked':''} data-id="${item.id}" class="toggle-avail"><span class="toggle-slider"></span></label>
                    <button class="edit-item-btn btn-sm" data-id="${item.id}">Edit</button>
                    <button class="copy-item-btn btn-sm" data-id="${item.id}" title="Duplicate">📋</button>
                    <button class="delete-item-btn btn-sm" data-id="${item.id}" style="color:#f87171;">Delete</button>
                </div>`;
            }).join('');
            document.querySelectorAll('.toggle-avail').forEach(cb => cb.addEventListener('change', async function(){ await _supabase.from('menu_items').update({available:this.checked}).eq('id',this.dataset.id); loadItems(); }));
            document.querySelectorAll('.edit-item-btn').forEach(b => b.addEventListener('click', ()=> editItem(b.dataset.id)));
            document.querySelectorAll('.copy-item-btn').forEach(b => b.addEventListener('click', ()=> duplicateItem(b.dataset.id)));
            document.querySelectorAll('.delete-item-btn').forEach(b => b.addEventListener('click', async ()=>{ if(confirm('Delete?')){ await _supabase.from('menu_items').delete().eq('id',b.dataset.id); loadItems(); loadStats(); } }));
        }

        function updateCategoryDatalist() { document.getElementById('categoryList').innerHTML = [...new Set(allItems.map(i=>i.category))].map(c=>`<option value="${c}">`).join(''); }

        function editItem(id) {
            const item = allItems.find(i=>i.id===id); if(!item) return;
            document.getElementById('editItemId').value = item.id;
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemPrice').value = item.price;
            document.getElementById('itemCategory').value = item.category;
            document.getElementById('itemDiscount').value = item.discount||'';
            document.getElementById('itemFeatured').checked = item.featured||false;
            document.getElementById('variantsContainer').innerHTML = '';
            if (item.description?.startsWith('VAR::')) {
                item.description.replace('VAR::','').split('|').forEach(v => {
                    const [n,p]=v.split('=');
                    const row = document.createElement('div'); row.className='flex-row'; row.style.marginBottom='0.3rem'; row.innerHTML=`<input class="var-name" value="${n}" style="flex:1"><input class="var-price" type="number" step="0.01" value="${p}" style="flex:1"><button class="remove-var btn-sm">✕</button>`;
                    document.getElementById('variantsContainer').appendChild(row);
                    row.querySelector('.remove-var').addEventListener('click', ()=>row.remove());
                });
            } else {
                const row = document.createElement('div'); row.className='flex-row'; row.style.marginBottom='0.3rem'; row.innerHTML='<input class="var-name" placeholder="Size" style="flex:1"><input class="var-price" type="number" step="0.01" placeholder="Price" style="flex:1"><button class="remove-var btn-sm">✕</button>';
                document.getElementById('variantsContainer').appendChild(row);
                row.querySelector('.remove-var').addEventListener('click', ()=>row.remove());
            }
            document.getElementById('itemDesc').value = item.description?.startsWith('VAR::') ? '' : (item.description||'');
            document.getElementById('submitItemBtn').textContent = 'Update Item';
            document.getElementById('saveAndNextBtn').style.display = 'none';
            document.getElementById('addItemCard').classList.remove('collapsed');
            document.getElementById('itemName').focus();
        }

        function duplicateItem(id) {
            const item = allItems.find(i=>i.id===id); if(!item) return;
            document.getElementById('editItemId').value = '';
            document.getElementById('itemName').value = item.name + ' (copy)';
            document.getElementById('itemPrice').value = item.price;
            document.getElementById('itemCategory').value = item.category;
            document.getElementById('itemDiscount').value = item.discount||'';
            document.getElementById('itemFeatured').checked = item.featured||false;
            document.getElementById('itemDesc').value = item.description?.startsWith('VAR::') ? '' : (item.description||'');
            document.getElementById('variantsContainer').innerHTML = '';
            if (item.description?.startsWith('VAR::')) {
                item.description.replace('VAR::','').split('|').forEach(v => {
                    const [n,p]=v.split('=');
                    const row = document.createElement('div'); row.className='flex-row'; row.style.marginBottom='0.3rem'; row.innerHTML=`<input class="var-name" value="${n}" style="flex:1"><input class="var-price" type="number" step="0.01" value="${p}" style="flex:1"><button class="remove-var btn-sm">✕</button>`;
                    document.getElementById('variantsContainer').appendChild(row);
                    row.querySelector('.remove-var').addEventListener('click', ()=>row.remove());
                });
            } else {
                const row = document.createElement('div'); row.className='flex-row'; row.style.marginBottom='0.3rem'; row.innerHTML='<input class="var-name" placeholder="Size" style="flex:1"><input class="var-price" type="number" step="0.01" placeholder="Price" style="flex:1"><button class="remove-var btn-sm">✕</button>';
                document.getElementById('variantsContainer').appendChild(row);
                row.querySelector('.remove-var').addEventListener('click', ()=>row.remove());
            }
            document.getElementById('submitItemBtn').textContent = 'Add Item';
            document.getElementById('saveAndNextBtn').style.display = 'inline-flex';
            document.getElementById('addItemCard').classList.remove('collapsed');
            document.getElementById('itemName').focus();
        }

        // Add variant, AI, submit logic
        document.getElementById('addVariantBtn').addEventListener('click', ()=>{
            const row = document.createElement('div'); row.className='flex-row'; row.style.marginBottom='0.3rem'; row.innerHTML='<input class="var-name" placeholder="Size" style="flex:1"><input class="var-price" type="number" step="0.01" placeholder="Price" style="flex:1"><button class="remove-var btn-sm">✕</button>';
            document.getElementById('variantsContainer').appendChild(row);
            row.querySelector('.remove-var').addEventListener('click', ()=>row.remove());
        });
        document.getElementById('aiDescBtn').addEventListener('click', ()=> document.getElementById('itemDesc').value = ['Rich and creamy.','A delightful blend.','Freshly prepared.','Our signature recipe.'][Math.floor(Math.random()*4)]);

        async function saveItem(andClear = false) {
            if (!cafeData.id) return toast('Cafe not ready', true);
            const editId = document.getElementById('editItemId').value;
            const name = document.getElementById('itemName').value.trim();
            if (!name) return toast('Name required', true);
            const category = document.getElementById('itemCategory').value.trim()||'Uncategorized';
            const price = parseFloat(document.getElementById('itemPrice').value)||0;
            const discount = document.getElementById('itemDiscount').value.trim();
            const featured = document.getElementById('itemFeatured').checked;
            const varRows = document.querySelectorAll('#variantsContainer > div');
            let desc = document.getElementById('itemDesc').value.trim();
            let hasVariants = false, varParts = [];
            varRows.forEach(r => {
                const vn = r.querySelector('.var-name')?.value.trim();
                const vp = r.querySelector('.var-price')?.value;
                if (vn && vp) { hasVariants = true; varParts.push(vn+'='+vp); }
            });
            if (hasVariants) desc = 'VAR::' + varParts.join('|');
            const payload = { name, description: desc, price, category, discount, featured, cafe_id: cafeData.id };
            const { error } = editId ? await _supabase.from('menu_items').update(payload).eq('id', editId) : await _supabase.from('menu_items').insert(payload);
            if (error) { toast('Save failed', true); return; }
            toast(editId ? 'Item updated!' : 'Item added!');
            loadItems(); loadStats();
            if (andClear) {
                resetItemForm();
                document.getElementById('itemName').focus();
            } else {
                resetItemForm();
            }
        }

        document.getElementById('submitItemBtn').addEventListener('click', (e) => { e.preventDefault(); saveItem(false); });
        document.getElementById('saveAndNextBtn').addEventListener('click', (e) => { e.preventDefault(); saveItem(true); });

        function resetItemForm() {
            document.getElementById('editItemId').value = '';
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '0';
            document.getElementById('itemCategory').value = 'Uncategorized';
            document.getElementById('itemDiscount').value = '';
            document.getElementById('itemFeatured').checked = false;
            document.getElementById('itemDesc').value = '';
            document.getElementById('variantsContainer').innerHTML = `<div class="flex-row" style="margin-bottom:0.3rem;"><input class="var-name" placeholder="Size" style="flex:1"><input class="var-price" type="number" step="0.01" placeholder="Price" style="flex:1"><button class="remove-var btn-sm">✕</button></div>`;
            document.getElementById('submitItemBtn').textContent = 'Save Item';
            document.getElementById('saveAndNextBtn').style.display = 'inline-flex';
            document.getElementById('addItemCard').classList.remove('collapsed');
        }

        // Order tabs
        document.querySelectorAll('.order-tabs button').forEach(b => b.addEventListener('click', function(){ document.querySelectorAll('.order-tabs button').forEach(x => x.classList.remove('active')); this.classList.add('active'); activeOrderTab = this.dataset.tab; renderOrders(); }));

        init();
    </script>
</body>
</html>
