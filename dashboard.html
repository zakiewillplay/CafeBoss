<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Boss - Live Dashboard</title>
    
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --brand-color: #ff9800;
            --success-color: #4caf50;
        }
        
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #333;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            color: var(--brand-color);
        }

        .activation-panel {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid #333;
        }

        .btn-activate {
            background-color: var(--brand-color);
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 152, 0, 0.3);
            transition: transform 0.1s;
        }

        .btn-activate:active {
            transform: scale(0.98);
        }

        #status-indicator {
            margin-top: 15px;
            font-weight: bold;
            color: #888;
        }

        .orders-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .order-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            border-left: 5px solid var(--success-color);
            animation: slideIn 0.3s ease-out;
        }

        .order-card h3 {
            margin-top: 0;
            color: var(--success-color);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="header">
        <h1>Cafe Boss Dashboard</h1>
        <div id="clock">Waiting for sync...</div>
    </div>

    <div class="activation-panel" id="activationPanel">
        <h2>System Standby</h2>
        <p>Click the button below to unlock live background audio and order synchronization.</p>
        <button class="btn-activate" onclick="activateSystem()">Turn On Live Orders & Audio</button>
        <div id="status-indicator">🔴 Offline</div>
    </div>

    <div class="orders-container" id="ordersList">
        </div>

    <audio id="orderAlertSound" src="notification.mp3" preload="auto"></audio>

    <script>
        // --- 1. CONFIGURATION (PRE-FILLED WITH YOUR LIVE KEYS) ---
        const SUPABASE_URL = 'https://udlmyspetkjzcdkfshgl.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkbG15c3BldGtqemNka2ZzaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxODIzMDksImV4cCI6MjA5NDc1ODMwOX0.oQL6hbwjQlU_2h4xcbD-v1yl7EubMz90VpIpTPBwEM4'; 
        
        let supabaseClient;
        const alertSound = document.getElementById('orderAlertSound');
        const statusIndicator = document.getElementById('status-indicator');
        const ordersList = document.getElementById('ordersList');

        // --- 2. SYSTEM ACTIVATION ---
        // Unlocks native audio and permissions on the phone browser screen
        function activateSystem() {
            // Request Native Browser Notifications
            if ('Notification' in window && Notification.permission !== 'granted') {
                Notification.requestPermission();
            }

            // Unlock Audio Playback for Android/Mobile devices
            alertSound.play().then(() => {
                alertSound.pause();
                alertSound.currentTime = 0;
            }).catch(err => console.log("Audio initialized:", err));

            // Connect to your database
            if (!supabaseClient) {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                startRealtimeListener();
            }

            // Update UI State
            statusIndicator.innerHTML = "🟢 Live & Listening for Orders";
            statusIndicator.style.color = "var(--success-color)";
            document.querySelector('.btn-activate').style.display = 'none';
        }

        // --- 3. SUPABASE REALTIME LISTENER ---
        // Captures inserts on the 'orders' table immediately via WebSockets
        function startRealtimeListener() {
            supabaseClient
                .channel('public:orders')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'orders' }, (payload) => {
                    const newOrder = payload.new;
                    console.log('🚨 Incoming Order Details:', newOrder);

                    // 1. Play the notification.mp3 file
                    alertSound.play().catch(e => console.error("Sound play blocked:", e));

                    // 2. Fire native device banner notification over screen
                    if ('Notification' in window && Notification.permission === 'granted') {
                        new Notification("🚨 New Cafe Boss Order!", {
                            body: `Amount: ₹${newOrder.total_price || newOrder.amount || '0'}`
                        });
                    }

                    // 3. Append the order to the dashboard feed instantly
                    renderOrderCard(newOrder);
                })
                .subscribe((status) => {
                    if(status === 'SUBSCRIBED') {
                        console.log("WebSocket connection established successfully.");
                    }
                });
        }

        // --- 4. VANILLA JS CARD RENDER ---
        function renderOrderCard(orderData) {
            const card = document.createElement('div');
            card.className = 'order-card';
            const timeString = new Date().toLocaleTimeString();

            card.innerHTML = `
                <h3>New Order Received</h3>
                <p><strong>Time:</strong> ${timeString}</p>
                <p><strong>Order ID:</strong> #${orderData.id || 'N/A'}</p>
                <hr style="border:0; border-top:1px solid #333; margin:10px 0;">
                <p style="color: #aaa; font-size: 0.9em;">Check your database table for item breakdowns.</p>
            `;

            ordersList.prepend(card);
        }

        // Dashboard Live Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
