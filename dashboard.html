<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Boss Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #f59e0b; --success: #10b981; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid #334155; padding-bottom: 15px; margin-bottom: 25px; }
        h1 { margin: 0; color: var(--accent); }
        .panel { background: var(--card); padding: 30px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
        button { background: var(--accent); color: #000; border: none; padding: 15px 30px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 8px; border-left: 5px solid var(--accent); animation: slideIn 0.3s ease-out forwards; }
        .new-badge { background: var(--success); color: white; font-size: 0.7rem; padding: 3px 8px; border-radius: 12px; float: right; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>Cafe Boss</h1>
        <div id="clock">00:00</div>
    </div>

    <div class="panel" id="activationPanel">
        <h2>System Standby</h2>
        <p style="color: #94a3b8; margin-bottom: 20px;">Click the button below to unlock live background audio and order synchronization.</p>
        <button id="activateBtn" onclick="activateSystem()">Turn On Live Orders & Audio</button>
        <div id="statusText" style="margin-top: 15px; font-weight: bold; color: #94a3b8;">🔴 Offline</div>
    </div>

    <div class="grid" id="ordersList"></div>

    <audio id="orderAlertSound" src="notification.mp3" preload="auto"></audio>

    <script>
        const SUPA_URL = 'https://udlmyspetkjzcdkfshgl.supabase.co'; 
        const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkbG15c3BldGtqemNka2ZzaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxODIzMDksImV4cCI6MjA5NDc1ODMwOX0.oQL6hbwjQlU_2h4xcbD-v1yl7EubMz90VpIpTPBwEM4'; 
        
        let client;
        const sound = document.getElementById('orderAlertSound');

        // Link SW (Silent catch so it doesn't break locally)
        try {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log("SW bypass for local testing."));
            }
        } catch(e) {}

        // Removed the 'async' keyword. This function will now run straight through instantly.
        function activateSystem() {
            const btn = document.getElementById('activateBtn');
            const statusText = document.getElementById('statusText');

            // 1. INSTANT UI UPDATE (Never wait for the browser again)
            statusText.innerHTML = "🟢 Live & Listening";
            statusText.style.color = "var(--success)";
            btn.style.display = 'none';

            // 2. Fire Audio (Non-blocking)
            try {
                let playPromise = sound.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        sound.pause();
                        sound.currentTime = 0;
                    }).catch(e => console.log("Audio unlock deferred to next interaction."));
                }
            } catch(e) {}

            // 3. Fire Notification Request (Non-blocking)
            try {
                if ('Notification' in window) {
                    if (Notification.permission === 'default') {
                        Notification.requestPermission(); // Notice there is no 'await' here
                    }
                }
            } catch(e) {}

            // 4. Connect to Supabase
            try {
                if (!client) {
                    // Create client and start listening immediately
                    client = supabase.createClient(SUPA_URL, SUPA_KEY);
                    startListener();
                }
            } catch (error) {
                alert("Database connection error: " + error.message);
                btn.style.display = 'inline-block';
                statusText.innerHTML = "🔴 Offline";
                statusText.style.color = "#94a3b8";
            }
        }

        function startListener() {
            client.channel('public:orders')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'orders' }, (payload) => {
                    
                    // Play sound instantly on new order
                    let playPromise = sound.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(e => console.log("Sound block:", e));
                    }
                    
                    // Show notification if allowed
                    if ('Notification' in window && Notification.permission === 'granted') {
                        new Notification("🚨 New Order!", { body: `Amount: ₹${payload.new.amount || '0'}` });
                    }
                    
                    // Render to screen
                    renderCard(payload.new);
                }).subscribe();
        }

        function renderCard(data) {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <h3 style="margin-top:0;">Order #${data.id || Math.floor(Math.random() * 1000)} <span class="new-badge">NEW</span></h3>
                <p>Time: ${new Date().toLocaleTimeString()}</p>
                <h2 style="color: var(--success); margin-bottom:0;">₹${data.amount || '0'}</h2>
            `;
            document.getElementById('ordersList').prepend(div);
        }

        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
    </script>
</body>
</html>
