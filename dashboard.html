<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/CafeBoss/manifest.json">
    <title>Cafe Boss – Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --primary: #FF6B35; --bg: #0f0f13; --card: rgba(25,25,30,0.85);
            --border: rgba(255,255,255,0.08); --text: #f0f0f0; --muted: #a0a0b0;
        }
        body.light-mode {
            --bg: #f2f1ed; --card: rgba(255,255,255,0.9); --border: rgba(0,0,0,0.12); --text: #1a1a1a; --muted: #555;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width: 100%; overflow-x: hidden; }
        body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); transition:0.4s; }
        .toast-container { position:fixed; top:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:10px; }
        .toast { background:#27ae60; color:#fff; padding:0.9rem 1.5rem; border-radius:12px; transform:translateX(120%); transition:0.3s; }
        .toast.show { transform:translateX(0); } .toast.error { background:#c0392b; }
        header { background:var(--card); border-bottom:1px solid var(--border); padding:1rem 1.5rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem; }
        .logo { font-weight:700; font-size:1.3rem; color:var(--primary); white-space: nowrap; }
        button, select, input, textarea { padding:0.5rem 0.8rem; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text); cursor:pointer; font-size:0.85rem; font-family:inherit; transition:0.2s; }
        button:hover { border-color:var(--primary); }
        .container { width: 100%; max-width:1200px; margin:1.5rem auto; padding:0 1rem; display:grid; gap:1.5rem; }
        .stats-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(130px,1fr)); gap:1rem; }
        .stat-card { background:var(--card); border-radius:14px; padding:1.2rem; text-align:center; }
        .stat-num { font-size:2rem; font-weight:700; color:var(--primary); }
        .card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:1.2rem; }
        .card h3 { cursor:pointer; display:flex; align-items:center; gap:0.5rem; font-size:1rem; user-select:none; }
        .collapsed .card-content { display:none; }
        .order-tabs { display:flex; margin-bottom:0.8rem; border-radius:8px; overflow:hidden; border:1px solid var(--border); }
        .order-tabs button { flex:1; padding:0.5rem; border:none; background:transparent; color:var(--muted); font-weight:600; font-size:0.8rem; }
        .order-tabs button.active { background:var(--primary); color:#fff; }
        .order-card { background:rgba(0,0,0,0.2); border-radius:10px; padding:0.8rem; margin-bottom:0.6rem; }
        .item-row { display:flex; align-items:center; gap:0.8rem; background:rgba(0,0,0,0.2); padding:0.6rem; border-radius:8px; margin-bottom:0.4rem; flex-wrap:wrap; }
        .badge { display:inline-block; padding:2px 6px; border-radius:4px; font-size:0.65rem; }
        .badge-discount { background:#c0392b; color:#fff; } .badge-featured { background:#f39c12; color:#000; }
        .toggle-switch { position:relative; width:40px; height:22px; }
        .toggle-switch input { opacity:0; width:0; height:0; }
        .toggle-slider { position:absolute; top:0;left:0;right:0;bottom:0; background:#555; border-radius:22px; transition:0.3s; }
        .toggle-slider:before { content:""; height:16px; width:16px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:0.3s; }
        input:checked+.toggle-slider { background:#27ae60; }
        input:checked+.toggle-slider:before { transform:translateX(18px); }
        .qr-display img { border-radius:12px; background:#fff; padding:0.5rem; }
        .btn-sm { padding:0.35rem 0.8rem; font-size:0.75rem; }
        .flex-row { display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; }
        .header-actions { display:flex; gap:0.4rem; align-items:center; flex-wrap:wrap; }
        .orders-toolbar { display:flex; gap:0.5rem; align-items:center; margin-bottom:0.8rem; flex-wrap:wrap; }
        .orders-toolbar input { flex:1; min-width:150px; }
        .menu-search { width: 100%; margin-bottom: 0.8rem; }
        .realtime-indicator { font-size:0.7rem; padding:0.2rem 0.5rem; border-radius:12px; margin-left:0.5rem; }
        .connected { background:#27ae60; color:#fff; }
        .disconnected { background:#c0392b; color:#fff; }
        .subscription-box { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:1.2rem; text-align:center; }
        .subscription-box input { margin:0.5rem 0; }
        @media (max-width: 500px) {
            header { flex-direction: column; align-items: flex-start; }
            .container { padding: 0 0.8rem; }
        }
    </style>
</head>
<body class="light-mode">
    <div class="toast-container" id="toastContainer"></div>
    <header>
        <div class="logo">☕ Cafe Boss <span id="realtimeStatus" class="realtime-indicator disconnected">⚫ Offline</span></div>
        <div class="header-actions">
            <select id="langSelect"><option value="en">EN</option><option value="hi">हि</option></select>
            <button id="themeToggle">🌙</button>
            <button id="unmuteBtn">🔊 Unmute</button>
            <button id="notifBtn" style="display:none;">🔔</button>
            <button id="testAlertBtn" title="Test sound & notification">📢</button>
            <button id="livePreviewBtn">👁️</button>
            <button id="logoutBtn" style="color:#f87171;">↪</button>
        </div>
    </header>
    <div class="container">
        <div id="subscriptionBoxContainer"></div>
        <div class="stats-row">
            <div class="stat-card"><div class="stat-num" id="statViews">0</div><div>Views</div></div>
            <div class="stat-card"><div class="stat-num" id="statItems">0</div><div>Items</div></div>
            <div class="stat-card"><div class="stat-num" id="statOrders">0</div><div>Orders</div></div>
        </div>
        <div class="card collapsed" id="analyticsCard">
            <h3>📊 Analytics <span>▼</span></h3>
            <div class="card-content">
                <div class="flex-row" style="margin-bottom:0.5rem;">
                    <button id="weekBtn" class="btn-sm active" style="background:var(--primary);">Week</button>
                    <button id="monthBtn" class="btn-sm">Month</button>
                </div>
                <canvas id="ordersChart" height="200"></canvas>
            </div>
        </div>
        <div class="card" id="ordersCard">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.8rem;">
                <h3 style="margin:0;">📋 Orders</h3>
                <button id="refreshOrdersBtn" class="btn-sm" title="Refresh orders">↻ Refresh</button>
            </div>
            <div class="card-content">
                <div class="orders-toolbar">
                    <input type="text" id="orderSearch" placeholder="🔍 Search table or customer...">
                    <button id="exportCsvBtn" class="btn-sm" title="Export to CSV">📥 CSV</button>
                    <button id="printTabBtn" class="btn-sm" title="Print all visible orders" style="display:none;">🖨️ Print All</button>
                </div>
                <div class="order-tabs">
                    <button class="active" data-tab="new">New</button>
                    <button data-tab="accepted">Accepted</button>
                    <button data-tab="completed">Completed</button>
                </div>
                <div id="ordersList"></div>
            </div>
        </div>
        <div class="card collapsed" id="settingsCard"><h3>⚙️ Settings</h3><div class="card-content"><input id="setCafeName" placeholder="Cafe name"><input id="setWhatsapp" placeholder="WhatsApp"><textarea id="setDesc" rows="2"></textarea><div class="flex-row"><input type="color" id="setPrimary" value="#FF6B35"><input type="color" id="setAccent" value="#2F3E46"></div><button id="saveSettingsBtn">Save</button></div></div>
        <div class="card collapsed" id="qrCard"><h3>📱 QR Code</h3><div class="card-content"><button id="generateQrBtn">Generate QR</button><div id="qrDisplay" class="qr-display"></div><p id="qrUrl" style="word-break:break-all; font-size:0.8rem;"></p><button id="copyQrLink" style="display:none;">📋 Copy Link</button></div></div>
        <div class="card" id="addItemCard">
            <h3>➕ Add Item <span>▼</span></h3>
            <div class="card-content">
                <input type="hidden" id="editItemId">
                <div class="flex-row" style="margin-bottom:0.5rem;">
                    <input id="itemName" placeholder="Item name *" style="flex:2;">
                    <input type="number" id="itemPrice" step="0.01" placeholder="Price ₹" style="width:100px;">
                </div>
                <div class="flex-row" style="margin-bottom:0.5rem;">
                    <select id="itemCategorySelect" class="select-cat" style="flex:1;">
                        <option value="Uncategorized">Uncategorized</option>
                        <option value="__new__">+ Add new…</option>
                    </select>
                    <input id="itemDiscount" placeholder="Discount" style="flex:1;">
                </div>
                <input id="itemCategoryInput" placeholder="New category name" style="display:none; margin-bottom:0.5rem;">
                <textarea id="itemDesc" placeholder="Description (optional)" rows="2" style="margin-bottom:0.5rem;"></textarea>
                <div class="flex-row" style="margin-bottom:0.5rem;">
                    <button id="aiDescBtn" class="btn-sm">✨ AI</button>
                    <label style="display:flex; align-items:center; gap:0.3rem; cursor:pointer; font-size:0.85rem;">
                        <input type="checkbox" id="itemFeatured"> 🔥 Chef's Special
                    </label>
                </div>
                <div id="variantsContainer" style="margin-bottom:0.5rem;">
                    <div class="flex-row" style="margin-bottom:0.3rem;">
                        <input class="var-name" placeholder="Size" style="flex:1;">
                        <input class="var-price" type="number" step="0.01" placeholder="Price" style="flex:1;">
                        <button class="remove-var btn-sm">✕</button>
                    </div>
                </div>
                <button id="addVariantBtn" class="btn-sm">+ Variant</button>
                <div class="flex-row" style="margin-top:0.8rem; gap:0.5rem;">
                    <button id="submitItemBtn" style="flex:1;">Save Item</button>
                    <button id="saveAndNextBtn" style="flex:1; background:var(--primary);">Save & Add Next</button>
                </div>
            </div>
        </div>
        <div class="card" id="menuItemsCard">
            <h3>📋 Menu Items <span>▼</span></h3>
            <div class="card-content">
                <input type="text" id="menuSearch" class="menu-search" placeholder="🔍 Search items by name, category, or description...">
                <div id="menuItemsList"></div>
            </div>
        </div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/CafeBoss/sw.js').catch(() => {});
        }

        const SUPABASE_URL = 'https://pbbybxdxnvzhjtkpfpej.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiYnlieGR4bnZ6aGp0a3BmcGVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQ0ODksImV4cCI6MjA5NDk0MDQ4OX0.u3VWUTu633pKfZ5Y8jpe2FUX4Gf9NGAKCsBGXqGTtao';
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const BASE_URL = 'https://zakiewillplay.github.io/CafeBoss/menu.html?id=';
        const jsPDF = window.jspdf?.jsPDF || window.jspdf;

        function toast(msg, err=false) {
            const el = document.createElement('div');
            el.className = 'toast ' + (err ? 'error' : '') + ' show';
            el.textContent = msg;
            document.getElementById('toastContainer').appendChild(el);
            setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 3000);
        }

        function applyTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.body.classList.remove('light-mode');
                document.getElementById('themeToggle').textContent = '☀️';
            } else {
                document.body.classList.add('light-mode');
                document.getElementById('themeToggle').textContent = '🌙';
            }
        }
        document.getElementById('themeToggle').addEventListener('click', () => { document.body.classList.toggle('light-mode'); localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark'); applyTheme(); });
        applyTheme();

        // Unmute forever
        let audioCtx = null;
        let audioReady = localStorage.getItem('cafeboss_unmuted') === 'true';
        const unmuteBtn = document.getElementById('unmuteBtn');
        const notifBtn = document.getElementById('notifBtn');
        const realtimeStatus = document.getElementById('realtimeStatus');

        if (audioReady) unmuteBtn.style.display = 'none';

        unmuteBtn.addEventListener('click', () => {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                audioReady = true;
                localStorage.setItem('cafeboss_unmuted', 'true');
                unmuteBtn.style.display = 'none';
                toast('Sound enabled forever!');
            } catch(e) { toast('Audio not supported', true); }
        });

        function beep() {
            if (!audioReady) return;
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;
                for (let i = 0; i < 3; i++) {
                    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'square'; osc.frequency.value = 1000;
                    gain.gain.setValueAtTime(0.4, now + i * 0.2);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.2 + 0.1);
                    osc.start(now + i * 0.2); osc.stop(now + i * 0.2 + 0.1);
                }
            } catch(e) {}
        }

        if ('Notification' in window) {
            const requestNotif = () => {
                if (Notification.permission === 'default') {
                    Notification.requestPermission().then(perm => {
                        if (perm === 'granted') { notifBtn.style.display = 'none'; toast('Alerts enabled!'); }
                        else { notifBtn.style.display = 'inline-flex'; notifBtn.textContent = '🔕'; toast('Notifications denied.', true); }
                    });
                } else if (Notification.permission === 'denied') { notifBtn.style.display = 'inline-flex'; notifBtn.textContent = '🔕'; }
                else if (Notification.permission === 'granted') { notifBtn.style.display = 'none'; }
            };
            notifBtn.addEventListener('click', requestNotif);
            document.addEventListener('click', () => { if (Notification.permission === 'default') requestNotif(); }, { once: true });
            if (Notification.permission !== 'granted') {
                notifBtn.style.display = 'inline-flex';
                notifBtn.textContent = Notification.permission === 'denied' ? '🔕' : '🔔';
            }
        }

        document.getElementById('testAlertBtn').addEventListener('click', () => { beep(); if (Notification.permission === 'granted') new Notification('Test Alert', { body:'Working!', icon:'☕' }); toast('Test beep played!'); });
        document.getElementById('logoutBtn').addEventListener('click', () => _supabase.auth.signOut().then(() => window.location.href='index.html'));
        document.getElementById('livePreviewBtn').addEventListener('click', () => { if (cafeData?.id) window.open(BASE_URL + cafeData.id, '_blank'); else toast('Cafe not ready', true); });
        document.querySelectorAll('.card h3').forEach(h => h.addEventListener('click', () => h.parentElement.classList.toggle('collapsed')));

        let cafeData = null, allOrders = [], allItems = [], activeOrderTab = 'new', chartInstance = null, analyticsMode = 'week';
        let realtimeChannel = null;

        async function getOrCreateCafe(uid) {
            const { data } = await _supabase.from('cafes').select('*').eq('owner_id', uid).maybeSingle();
            if (data) return data;
            const { data: ins } = await _supabase.from('cafes').insert({ owner_id: uid, cafe_name: 'My Cafe' }).select().maybeSingle();
            return ins || { id: null, cafe_name:'My Cafe', _temp:true };
        }

        async function init() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href='auth.html'; return; }
            cafeData = await getOrCreateCafe(user.id);
            if (cafeData._temp) toast('Cafe profile not ready.', true);
            document.getElementById('setCafeName').value = cafeData.cafe_name||'';
            document.getElementById('setWhatsapp').value = cafeData.whatsapp||'';
            document.getElementById('setDesc').value = cafeData.description||'';
            document.getElementById('setPrimary').value = cafeData.primary_color||'#FF6B35';
            document.getElementById('setAccent').value = cafeData.accent_color||'#2F3E46';
            await Promise.all([loadStats(), loadOrders(), loadItems(), loadAnalytics(), loadSubscriptionInfo()]);
            if (cafeData.id && !cafeData._temp) setupRealtime();
            else {
                setTimeout(async () => {
                    if (!cafeData.id || cafeData._temp) {
                        cafeData = await getOrCreateCafe(user.id);
                        if (cafeData.id && !cafeData._temp) {
                            await Promise.all([loadStats(), loadOrders(), loadItems(), loadAnalytics(), loadSubscriptionInfo()]);
                            setupRealtime();
                            toast('Cafe profile ready!', false);
                        }
                    }
                }, 2000);
            }
        }

        // ---------- SUBSCRIPTION / PAYMENT ----------
        async function loadSubscriptionInfo() {
            const container = document.getElementById('subscriptionBoxContainer');
            if (!cafeData || !cafeData.id || cafeData._temp) return;

            const { data: settings } = await _supabase.from('app_settings').select('*').maybeSingle();
            if (!settings || !settings.subscription_price || settings.subscription_price <= 0) {
                container.innerHTML = '';
                return;
            }

            const cafe = cafeData;
            const isPaid = cafe.subscription_paid;
            const paymentStatus = cafe.payment_status || 'unpaid';
            const transactionId = cafe.transaction_id || '';

            if (isPaid) {
                container.innerHTML = `<div class="subscription-box"><p style="color:#27ae60;">✅ Subscription Active</p></div>`;
                return;
            }

            let html = `<div class="subscription-box">
                <h3 style="color:var(--primary);">🔒 Subscribe to unlock your menu</h3>
                <p>${settings.subscription_message || 'Pay via UPI and enter your Transaction ID below.'}</p>
                <p><strong>UPI ID:</strong> ${settings.upi_id || '—'}</p>
                <p><strong>Amount:</strong> ₹${settings.subscription_price}/month</p>`;

            if (paymentStatus === 'pending') {
                html += `<p style="color:#f39c12;">⏳ Payment pending approval. Transaction ID: ${transactionId || 'N/A'}</p>`;
            } else if (paymentStatus === 'approved' || isPaid) {
                // already covered above
            } else {
                // unpaid, rejected, or null – show input
                html += `<input type="text" id="transactionIdInput" placeholder="Enter UPI Transaction ID">
                <button id="submitPaymentBtn" class="btn-sm" style="margin-top:0.5rem;">Submit for Approval</button>`;
            }

            html += `</div>`;
            container.innerHTML = html;

            const submitBtn = document.getElementById('submitPaymentBtn');
            if (submitBtn) {
                submitBtn.addEventListener('click', async () => {
                    const transId = document.getElementById('transactionIdInput').value.trim();
                    if (!transId) return toast('Please enter the transaction ID', true);
                    const { error } = await _supabase.from('cafes').update({
                        transaction_id: transId,
                        payment_status: 'pending'
                    }).eq('id', cafeData.id);
                    if (error) {
                        toast('Failed to submit. Please try again.', true);
                    } else {
                        toast('Payment submitted! Waiting for admin approval.');
                        cafeData.transaction_id = transId;
                        cafeData.payment_status = 'pending';
                        loadSubscriptionInfo();
                    }
                });
            }
        }

        // Rest of dashboard logic – orders, CSV, PDF, analytics, items, etc. (unchanged from previous full version)
        // … (I'll insert the complete remaining functions here.)
    </script>
</body>
</html>
