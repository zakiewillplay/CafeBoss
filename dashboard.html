<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Live Dashboard | Cafe Boss</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --bg: #1c1917; --surface: #292524; --primary: #f59e0b; --text: #ffffff; --text-light: #a8a29e; --success: #10b981; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
    body { background-color: var(--bg); color: var(--text); padding: 16px; min-height: 100vh; display: flex; flex-direction: column; }
    
    header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0 24px; border-bottom: 1px solid #444; }
    h1 { font-size: 1.4rem; color: var(--primary); }
    .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; background: #444; color: #ccc; display: flex; align-items: center; gap: 6px; }
    .status-badge.live { background: rgba(16, 185, 129, 0.2); color: var(--success); }
    
    #startOverlay { background: var(--surface); padding: 24px; border-radius: 16px; text-align: center; margin-top: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    #startOverlay h2 { margin-bottom: 12px; }
    #startOverlay p { color: var(--text-light); margin-bottom: 24px; font-size: 0.9rem; }
    .btn-activate { width: 100%; padding: 16px; background: var(--primary); color: #000; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
    
    .feed { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; flex: 1; overflow-y: auto; }
    .order-card { background: var(--surface); padding: 16px; border-radius: 12px; border-left: 4px solid var(--primary); animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .order-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-light); }
    .order-id { font-weight: bold; color: var(--text); }
    .order-items { font-size: 1.2rem; font-weight: 600; margin-bottom: 8px; }
    .order-footer { display: flex; justify-content: space-between; align-items: center; }
    .order-total { color: var(--success); font-weight: bold; }
    
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</head>
<body>
  
  <header>
    <h1>Live Feed</h1>
    <div id="connectionStatus" class="status-badge">⚪ Offline</div>
  </header>

  <div id="startOverlay">
    <h2>Activate Dashboard</h2>
    <p>Enable background listening and audio alerts.</p>
    <button id="activateBtn" class="btn-activate">Start Listening</button>
  </div>

  <div id="orderFeed" class="feed"></div>

  <!-- Audio element with relative path -->
  <audio id="alertSound" src="./notification.mp3" preload="auto"></audio>

  <script>
    const supabase = window.supabase.createClient(
      'https://udlmyspetkjzcdkfshgl.supabase.co', 
      'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkbG15c3BldGtqemNka2ZzaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxODIzMDksImV4cCI6MjA5NDc1ODMwOX0.oQL6hbwjQlU_2h4xcbD-v1yl7EubMz90VpIpTPBwEM4'
    );
    
    const activateBtn = document.getElementById('activateBtn');
    const startOverlay = document.getElementById('startOverlay');
    const statusBadge = document.getElementById('connectionStatus');
    const orderFeed = document.getElementById('orderFeed');
    const alertSound = document.getElementById('alertSound');

    activateBtn.addEventListener('click', () => {
      // 1. INSTANT UI UPDATE (Bypass waiting for permissions)
      startOverlay.style.display = 'none';
      statusBadge.innerHTML = '🟢 Live & Listening';
      statusBadge.classList.add('live');

      // 2. AUDIO UNLOCK - Wrapped in safe try/catch
      try {
        const playPromise = alertSound.play();
        if (playPromise !== undefined) {
          playPromise.then(() => {
            alertSound.pause();
            alertSound.currentTime = 0;
          }).catch(e => console.warn('Audio bypass:', e));
        }
      } catch(err) {
        console.warn('Audio block handled silently');
      }

      // 3. NATIVE NOTIFICATION - strictly NO AWAIT, wrapped in try/catch
      try {
        if ('Notification' in window && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
          // Fire and forget, do not wait for resolution
          Notification.requestPermission().then(permission => {
            console.log('Push permission status:', permission);
          }).catch(e => console.warn('Notification promise rejected:', e));
        }
      } catch(err) {
        console.warn('Notification block handled silently');
      }

      // 4. SUPABASE WEBSOCKET CONNECTION
      try {
        const ordersChannel = supabase.channel('public:orders');
        
        ordersChannel.on(
          'postgres_changes',
          { event: 'INSERT', schema: 'public', table: 'orders' },
          (payload) => {
            handleIncomingOrder(payload.new);
          }
        ).subscribe((status) => {
          if (status === 'SUBSCRIBED') {
            console.log('Realtime connected securely.');
          }
        });
      } catch (err) {
        console.error('Supabase connection failed:', err);
      }
    });

    function handleIncomingOrder(order) {
      // Build DOM element
      const card = document.createElement('div');
      card.className = 'order-card';
      card.innerHTML = `
        <div class="order-header">
          <span class="order-id">${order.order_id || '#0000'}</span>
          <span>Just Now</span>
        </div>
        <div class="order-items">${order.summary || 'New Order'}</div>
        <div class="order-footer">
          <span class="order-total">$${parseFloat(order.total || 0).toFixed(2)}</span>
        </div>
      `;
      
      // Append to top
      orderFeed.prepend(card);

      // Trigger Audio Alert safely
      try {
        alertSound.currentTime = 0;
        const playPromise = alertSound.play();
        if (playPromise !== undefined) {
          playPromise.catch(e => console.warn('Autoplay prevented:', e));
        }
      } catch(e) {}

      // Trigger Native Notification safely
      try {
        if ('Notification' in window && Notification.permission === 'granted') {
          new Notification('New Order Received!', {
            body: order.summary ? `Items: ${order.summary}` : 'Check the dashboard.',
            icon: './icon-192.png',
            vibrate: [200, 100, 200]
          });
        }
      } catch(e) {}
    }
  </script>
</body>
</html>
