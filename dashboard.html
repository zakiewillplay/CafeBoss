<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Boss - Live Dashboard</title>
    
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --brand-color: #ff6b6b;
            --success-color: #4caf50;
        }
        
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #ddd;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            color: var(--brand-color);
        }

        .activation-panel {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            margin-bottom: 30px;
        }

        .btn-activate {
            background-color: var(--brand-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.3);
            transition: transform 0.1s;
        }

        .btn-activate:active {
            transform: scale(0.98);
        }

        #status-indicator {
            margin-top: 15px;
            font-weight: bold;
            color: #888;
        }

        .orders-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .order-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--success-color);
            animation: slideIn 0.3s ease-out;
        }

        .order-card h3 {
            margin-top: 0;
            color: var(--success-color);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="header">
        <h1>Cafe Boss Dashboard</h1>
        <div id="clock">Waiting for sync...</div>
    </div>

    <div class="activation-panel" id="activationPanel">
        <h2>System Standby</h2>
        <p>You must click the button below to unlock background audio and notifications.</p>
        <button class="btn-activate" onclick="activateSystem()">Turn On Live Orders & Audio</button>
        <div id="status-indicator">🔴 Offline</div>
    </div>

    <div class="orders-container" id="ordersList">
        </div>

    <audio id="orderAlertSound" src="notification.mp3" preload="auto"></audio>

    <script>
        // --- 1. CONFIGURATION ---
        // REPLACE THESE WITH YOUR REAL SUPABASE CREDENTIALS
        const SUPABASE_URL = 'https://YOUR-PROJECT-ID.supabase.co';
        const SUPABASE_ANON_KEY = 'YOUR-ANON-KEY-HERE';
        
        let supabaseClient;
        const alertSound = document.getElementById('orderAlertSound');
        const statusIndicator = document.getElementById('status-indicator');
        const ordersList = document.getElementById('ordersList');

        // --- 2. SYSTEM ACTIVATION ---
        // This function runs when the cafe owner taps the big activation button.
        function activateSystem() {
            // A. Request Native Browser Notifications
            if ('Notification' in window && Notification.permission !== 'granted') {
                Notification.requestPermission();
            }

            // B. Unlock Audio Playback for Android/Mobile
            alertSound.play().then(() => {
                alertSound.pause();
                alertSound.currentTime = 0;
            }).catch(err => console.log("Audio unlock note:", err));

            // C. Connect to Database
            if (!supabaseClient) {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                startRealtimeListener();
            }

            // Update UI
            statusIndicator.innerHTML = "🟢 Live & Listening for Orders";
            statusIndicator.style.color = "var(--success-color)";
            document.querySelector('.btn-activate').style.display = 'none';
        }

        // --- 3. SUPABASE REALTIME LISTENER ---
        function startRealtimeListener() {
            supabaseClient
                .channel('public:orders')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'orders' }, (payload) => {
                    const newOrder = payload.new;
                    console.log('🚨 Incoming Order:', newOrder);

                    // 1. Fire the Audio Ringtone
                    alertSound.play().catch(e => console.error("Sound blocked by browser:", e));

                    // 2. Fire the System Notification Over the Screen
                    if ('Notification' in window && Notification.permission === 'granted') {
                        new Notification("🚨 New Cafe Boss Order!", {
                            body: `Check dashboard for details.`,
                            // Optional: Add the path to your icon if you have one
                            // icon: "/icon.png" 
                        });
                    }

                    // 3. Inject the order visually into the HTML
                    renderOrderCard(newOrder);
                })
                .subscribe((status) => {
                    if(status === 'SUBSCRIBED') {
                        console.log("Successfully locked into database stream.");
                    }
                });
        }

        // --- 4. VANILLA JS HTML INJECTION ---
        function renderOrderCard(orderData) {
            // Create the card div
            const card = document.createElement('div');
            card.className = 'order-card';
            
            // Format a simple timestamp
            const timeString = new Date().toLocaleTimeString();

            // Structure the inner HTML (Customize this based on your database columns)
            card.innerHTML = `
                <h3>New Order Received</h3>
                <p><strong>Time:</strong> ${timeString}</p>
                <p><strong>Order ID:</strong> #${orderData.id || 'N/A'}</p>
                <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
                <p style="color: #666; font-size: 0.9em;">Refresh page for full details or check admin panel.</p>
            `;

            // Insert at the top of the list
            ordersList.prepend(card);
        }

        // Simple clock for the UI
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
