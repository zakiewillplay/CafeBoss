<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Menu</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #f8fafc; color: #334155; padding: 20px; margin: 0; }
        .header { text-align: center; padding: 20px; background: #0f172a; color: white; border-radius: 12px; margin-bottom: 20px;}
        .menu-item { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        .order-btn { background: #f59e0b; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px;}
    </style>
</head>
<body>
    <div class="header">
        <h1>Cafe Al Buraaq</h1>
        <p>Digital Order System</p>
    </div>

    <div id="menuList">
        <div class="menu-item">
            <div><strong>Test Coffee</strong><br>₹150</div>
        </div>
    </div>

    <button class="order-btn" onclick="placeTestOrder()">Tap to Send Test Order</button>

    <script>
        const sup = supabase.createClient('https://udlmyspetkjzcdkfshgl.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkbG15c3BldGtqemNka2ZzaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxODIzMDksImV4cCI6MjA5NDc1ODMwOX0.oQL6hbwjQlU_2h4xcbD-v1yl7EubMz90VpIpTPBwEM4');

        async function placeTestOrder() {
            const btn = document.querySelector('.order-btn');
            btn.innerText = "Sending...";
            
            // Fires directly into the 'orders' table to wake up the dashboard
            const { error } = await sup.from('orders').insert([{ amount: 150 }]);
            
            if(error) {
                alert("Order failed. Check database RLS.");
                btn.innerText = "Try Again";
            } else {
                btn.innerText = "Order Sent!";
                btn.style.background = "#10b981";
                setTimeout(() => { btn.innerText = "Tap to Send Test Order"; btn.style.background = "#f59e0b"; }, 3000);
            }
        }
    </script>
</body>
</html>
